<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#030305">
    <title>Explorar · Sugar Free</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        :root {
            --bg:        #030305;
            --rose:      #FF3B7F;
            --rose-dim:  rgba(255,59,127,0.15);
            --rose-line: rgba(255,59,127,0.12);
            --gold:      #C9A96E;
            --white:     #FFFFFF;
            --w80:       rgba(255,255,255,0.8);
            --w50:       rgba(255,255,255,0.5);
            --w20:       rgba(255,255,255,0.2);
            --w10:       rgba(255,255,255,0.1);
            --w06:       rgba(255,255,255,0.06);
            --w04:       rgba(255,255,255,0.04);
            --ease:      cubic-bezier(0.16,1,0.3,1);
            --nav-h:     64px;
            --safe-top:    env(safe-area-inset-top,    0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left:   env(safe-area-inset-left,   0px);
            --safe-right:  env(safe-area-inset-right,  0px);
        }

        html { overflow-x: hidden; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-overflow-scrolling: touch;
        }

        /* ── FONDO ──────────────────────────────────────────── */
        .geo-bg {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none; overflow: hidden;
        }
        .geo-bg::before {
            content: '';
            position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,59,127,0.14) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse 90% 90% at 50% 0%, black 20%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 0%, black 20%, transparent 100%);
        }
        .geo-bg::after {
            content: '';
            position: absolute; inset: 0;
            background-image:
                repeating-linear-gradient(-60deg, transparent 0, transparent 80px, rgba(255,59,127,0.03) 80px, rgba(255,59,127,0.03) 81px),
                repeating-linear-gradient(30deg,  transparent 0, transparent 120px, rgba(201,169,110,0.02) 120px, rgba(201,169,110,0.02) 121px);
        }
        .ambient {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 50% 30% at 90% 5%,  rgba(255,59,127,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 5%  95%, rgba(201,169,110,0.04) 0%, transparent 70%);
        }

        /* ── NAVBAR ─────────────────────────────────────────── */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + var(--safe-top));
            padding-top: var(--safe-top);
            background: rgba(3,3,5,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--rose-line);
            z-index: 200;
            display: flex;
            align-items: flex-end;
        }

        .navbar-inner {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 clamp(16px,3vw,40px);
            padding-left:  calc(clamp(16px,3vw,40px) + var(--safe-left));
            padding-right: calc(clamp(16px,3vw,40px) + var(--safe-right));
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 34px; height: 34px;
            background: var(--rose-dim);
            border: 1px solid var(--rose);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--rose); font-size: 14px;
        }
        .nav-logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 18px; font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg,#fff,var(--rose));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 16px;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            min-height: 36px;
            touch-action: manipulation;
            text-decoration: none;
        }
        .nav-btn-ghost {
            background: transparent;
            border: 1px solid var(--w10);
            color: var(--w80);
        }
        .nav-btn-ghost:active, .nav-btn-ghost:hover {
            border-color: var(--rose);
            color: var(--white);
        }
        .nav-btn-primary {
            background: var(--rose);
            border: none;
            color: #fff;
        }
        .nav-btn-primary:active { transform: scale(0.96); }
        @media (hover:hover) {
            .nav-btn-primary:hover { background: #ff2070; }
        }

        /* Contador de solicitudes pendientes */
        .notif-dot {
            width: 18px; height: 18px;
            background: var(--rose);
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            margin-left: -4px;
            margin-top: -16px;
            border: 2px solid var(--bg);
        }

        /* ── LAYOUT PRINCIPAL ───────────────────────────────── */
        .page {
            position: relative;
            z-index: 10;
            padding-top: calc(var(--nav-h) + var(--safe-top));
            min-height: 100vh;
            min-height: 100dvh;
        }

        .page-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px clamp(16px,3vw,40px) 80px;
            padding-left:  calc(clamp(16px,3vw,40px) + var(--safe-left));
            padding-right: calc(clamp(16px,3vw,40px) + var(--safe-right));
            padding-bottom: calc(80px + var(--safe-bottom));
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }

        /* ── SIDEBAR FILTROS ────────────────────────────────── */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            position: sticky;
            top: calc(var(--nav-h) + var(--safe-top) + 28px);
            max-height: calc(100dvh - var(--nav-h) - var(--safe-top) - 56px);
            overflow-y: auto;
            scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar { display: none; }

        .sidebar-title {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--rose);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-title::after {
            content: '';
            flex: 1; height: 1px;
            background: var(--rose-line);
        }

        .filter-group { margin-bottom: 28px; }

        .filter-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--w50);
            margin-bottom: 10px;
            display: block;
        }

        /* Chips de filtro */
        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .chip {
            padding: 7px 14px;
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 50px;
            font-size: 12px;
            color: var(--w80);
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            user-select: none;
            min-height: 34px;
            display: flex;
            align-items: center;
        }
        .chip:active { transform: scale(0.95); }
        .chip.active {
            background: var(--rose-dim);
            border-color: var(--rose);
            color: var(--white);
        }
        @media (hover:hover) {
            .chip:hover:not(.active) {
                border-color: rgba(255,59,127,0.35);
                color: var(--white);
            }
        }

        /* Range slider */
        .range-wrap {
            position: relative;
            padding-bottom: 6px;
        }
        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--w50);
            margin-bottom: 8px;
        }
        .range-val {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--rose);
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: var(--w10);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--rose);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,59,127,0.5);
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--rose);
            cursor: pointer;
            border: none;
        }

        .filter-reset {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--w10);
            border-radius: 10px;
            color: var(--w50);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.25s;
            touch-action: manipulation;
            margin-top: 4px;
        }
        .filter-reset:active, .filter-reset:hover {
            border-color: var(--rose);
            color: var(--rose);
        }

        /* ── ÁREA DE RESULTADOS ─────────────────────────────── */
        .results-area { flex: 1; min-width: 0; }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .results-count {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }
        .results-count span { color: var(--rose); }

        .results-sort {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--w50);
        }
        .sort-select {
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 8px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 7px 12px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        .sort-select option { background: #0d0d18; }

        /* ── GRID DE CARDS ──────────────────────────────────── */
        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }

        /* Card de perfil */
        .profile-card {
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
            touch-action: manipulation;
            position: relative;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.45s var(--ease), transform 0.45s var(--ease),
                        border-color 0.25s, box-shadow 0.25s;
        }
        .profile-card.visible { opacity: 1; transform: translateY(0); }

        @media (hover:hover) {
            .profile-card:hover {
                border-color: var(--rose);
                box-shadow: 0 12px 32px rgba(255,59,127,0.14);
                transform: translateY(-4px);
            }
        }
        .profile-card:active { transform: scale(0.98); }

        /* Foto */
        .card-photo {
            position: relative;
            aspect-ratio: 3/4;
            background: rgba(255,255,255,0.03);
            overflow: hidden;
        }

        .card-photo-img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.5s var(--ease);
        }
        @media (hover:hover) {
            .profile-card:hover .card-photo-img { transform: scale(1.04); }
        }

        /* Gradiente sobre la foto */
        .card-photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 40%,
                rgba(3,3,5,0.5) 70%,
                rgba(3,3,5,0.92) 100%
            );
        }

        /* Badge de tipo */
        .card-type-badge {
            position: absolute;
            top: 12px; left: 12px;
            padding: 5px 11px;
            border-radius: 50px;
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            backdrop-filter: blur(8px);
        }
        .badge-daddy  { background: rgba(201,169,110,0.2); border: 1px solid rgba(201,169,110,0.5); color: var(--gold); }
        .badge-mommy  { background: rgba(201,169,110,0.2); border: 1px solid rgba(201,169,110,0.5); color: var(--gold); }
        .badge-sboy   { background: var(--rose-dim);       border: 1px solid rgba(255,59,127,0.4);  color: var(--rose); }
        .badge-sgirl  { background: var(--rose-dim);       border: 1px solid rgba(255,59,127,0.4);  color: var(--rose); }

        /* Botón rápido de solicitud sobre la foto */
        .card-quick-action {
            position: absolute;
            bottom: 12px; right: 12px;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--rose);
            border: none;
            color: #fff;
            font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.25s;
            touch-action: manipulation;
            box-shadow: 0 4px 14px rgba(255,59,127,0.4);
            z-index: 2;
        }
        .card-quick-action:active { transform: scale(0.9); }
        @media (hover:hover) {
            .card-quick-action:hover { transform: scale(1.12); box-shadow: 0 6px 20px rgba(255,59,127,0.5); }
        }
        .card-quick-action.sent {
            background: rgba(46,204,113,0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            box-shadow: none;
        }

        /* Info */
        .card-info {
            padding: 14px 16px 16px;
        }

        .card-name-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 6px;
        }
        .card-name {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-age {
            font-size: 13px;
            color: var(--w50);
            flex-shrink: 0;
        }

        .card-city {
            font-size: 12px;
            color: var(--w50);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }
        .card-city i { color: var(--rose); font-size: 10px; }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .card-tag {
            padding: 3px 9px;
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 50px;
            font-size: 10px;
            color: var(--w50);
            white-space: nowrap;
        }
        .card-tag-more {
            padding: 3px 9px;
            font-size: 10px;
            color: var(--rose);
        }

        /* ── MOBILE FILTER TOGGLE ───────────────────────────── */
        .mobile-filter-btn {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 50px;
            color: var(--w80);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            touch-action: manipulation;
            min-height: 40px;
        }
        .mobile-filter-btn i { color: var(--rose); }

        /* Filter sheet (móvil) */
        .filter-sheet-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 300;
            backdrop-filter: blur(4px);
        }
        .filter-sheet-overlay.open { display: block; }

        .filter-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0a0a12;
            border-top: 1px solid var(--rose-line);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px;
            padding-bottom: calc(24px + var(--safe-bottom));
            z-index: 301;
            max-height: 85dvh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s var(--ease);
        }
        .filter-sheet-overlay.open .filter-sheet {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px; height: 4px;
            background: var(--w20);
            border-radius: 2px;
            margin: 0 auto 24px;
        }

        /* ── MODAL DE PERFIL ────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 400;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #0a0a12;
            border: 1px solid var(--rose-line);
            border-radius: 24px;
            width: 100%;
            max-width: 520px;
            max-height: 90dvh;
            overflow-y: auto;
            scrollbar-width: none;
            position: relative;
            animation: modalIn 0.4s var(--ease);
        }
        .modal::-webkit-scrollbar { display: none; }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-photo {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 22px 22px 0 0;
            display: block;
        }

        .modal-body { padding: 24px; }

        .modal-name-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .modal-name {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
        }
        .modal-age { font-size: 16px; color: var(--w50); }

        .modal-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .modal-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: var(--w50);
        }
        .modal-meta-item i { color: var(--rose); font-size: 11px; }

        .modal-section-title {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--rose);
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .modal-bio {
            font-size: 14px;
            color: var(--w80);
            line-height: 1.7;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }
        .modal-tag {
            padding: 6px 13px;
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 50px;
            font-size: 12px;
            color: var(--w80);
        }

        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            width: 34px; height: 34px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--w10);
            color: var(--w80);
            font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        .modal-close:active { transform: scale(0.9); }

        /* ── MODAL DE SOLICITUD ─────────────────────────────── */
        .request-modal {
            background: #0a0a12;
            border: 1px solid var(--rose-line);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 32px;
            animation: modalIn 0.35s var(--ease);
        }

        .request-modal h3 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .request-modal p {
            font-size: 14px;
            color: var(--w50);
            margin-bottom: 22px;
            line-height: 1.5;
        }
        .request-modal p strong { color: var(--rose); }

        .request-textarea {
            width: 100%;
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 14px;
            padding: 14px 16px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            min-height: 100px;
            outline: none;
            transition: border-color 0.25s;
            -webkit-appearance: none;
        }
        .request-textarea:focus {
            border-color: var(--rose);
            box-shadow: 0 0 0 3px rgba(255,59,127,0.1);
        }
        .request-textarea::placeholder { color: var(--w20); }

        .request-char {
            text-align: right;
            font-size: 11px;
            color: var(--w20);
            margin-top: 6px;
            margin-bottom: 20px;
        }
        .request-char.warn { color: var(--rose); }

        .request-actions {
            display: flex;
            gap: 10px;
        }

        .btn-cancel {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--w10);
            border-radius: 50px;
            color: var(--w80);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            touch-action: manipulation;
        }
        .btn-cancel:active { border-color: var(--rose); color: var(--rose); }

        .btn-send {
            flex: 2;
            padding: 14px;
            background: var(--rose);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            touch-action: manipulation;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        @media (hover:hover) { .btn-send:hover { background: #ff2070; } }
        .btn-send:active { transform: scale(0.97); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── ESTADO VACÍO ───────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            display: none;
        }
        .empty-state.visible { display: block; }
        .empty-state i {
            font-size: 48px;
            color: var(--w20);
            margin-bottom: 16px;
            display: block;
        }
        .empty-state h3 {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .empty-state p { font-size: 14px; color: var(--w50); }

        /* ── TOAST ──────────────────────────────────────────── */
        .toast {
            position: fixed;
            z-index: 9999;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            background: rgba(8,8,15,0.97);
            border-radius: 50px;
            padding: 13px 20px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.5);
            transition: transform 0.4s var(--ease), opacity 0.4s;
        }
        .toast.success { border: 1px solid rgba(46,204,113,0.4); }
        .toast.success i { color: #2ecc71; }
        .toast.error { border: 1px solid rgba(255,60,60,0.4); }
        .toast.error i { color: #ff4444; }
        @media (min-width: 481px) {
            .toast { top: calc(var(--nav-h) + var(--safe-top) + 16px); right: 20px; }
            .toast.hidden { transform: translateX(120%); opacity: 0; }
        }
        @media (max-width: 480px) {
            .toast { bottom: calc(20px + var(--safe-bottom)); left: 16px; right: 16px; border-radius: 14px; }
            .toast.hidden { transform: translateY(120%); opacity: 0; }
        }

        /* ── RESPONSIVE ─────────────────────────────────────── */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .mobile-filter-btn { display: flex; }
        }

        @media (max-width: 600px) {
            .profiles-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .card-info { padding: 10px 12px 12px; }
            .card-name { font-size: 14px; }
        }

        @media (max-width: 360px) {
            .profiles-grid { grid-template-columns: 1fr; }
        }

        /* Ocultar texto en nav en móvil pequeño */
        @media (max-width: 420px) {
            .nav-btn span { display: none; }
            .nav-btn { padding: 8px 12px; }
        }

    <script>

          tags:['Moda','Arte','Gastronomía'], relation:['Compañía social','Amistad premium'],

        { id:9,  name:'Emilio',     age:21, city:'Ciudad de México', type:'sboy',
          tags:['Fitness','Deportes','Viajes'], relation:['Compañero de viajes','Compañía social'],
          bio:'Atleta universitario. Jovial, puntual y adaptable a cualquier situación social.',
          photo:'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=400&q=80' },

        { id:10, name:'Natalia',    age:27, city:'Monterrey',       type:'sgirl',
          tags:['Música','Arte','Conversación'], relation:['Amistad premium','Compañía social'],
          bio:'Pianista de conservatorio. Vivo entre la música clásica y el jazz contemporáneo.',
          photo:'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=400&q=80' },

        { id:11, name:'Fernando',   age:48, city:'Guadalajara',     type:'daddy',
          tags:['Tenis','Viajes','Cultura'], relation:['Viajes','Compañía social'],
          bio:'Médico especialista. Equilibrado, culto y discreto. Busco momentos de calidad.',
          photo:'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400&q=80' },

        { id:12, name:'Valentina',  age:25, city:'Puebla',          type:'sgirl',
          tags:['Baile','Eventos','Discreción'], relation:['Compañía social','Conexión íntima'],
          bio:'Bailarina profesional. Elegante, divertida y con presencia en cualquier evento.',
          photo:'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=400&q=80' },
    ];

    // ================================================================
    //  ESTADO
    // ================================================================
    let filters = {
        type: 'all',   // all | daddy | mommy | sboy | sgirl
        city: 'all',
        ageMin: 18,
        ageMax: 60,
    };
    let sentRequests = new Set(); // IDs a quienes ya se envió solicitud
    let currentProfile = null;   // perfil abierto en modal

    const CITIES = [...new Set(PROFILES.map(p => p.city))].sort();

    // ================================================================
    //  FILTROS HTML (reutilizado en sidebar y sheet móvil)
    // ================================================================
    function buildFiltersHTML() {
        return `
        <div class="sidebar-title">Filtros</div>

        <div class="filter-group">
            <span class="filter-label">Tipo de perfil</span>
            <div class="filter-chips">
                <div class="chip ${filters.type==='all'   ?'active':''}" data-filter="type" data-val="all">Todos</div>
                <div class="chip ${filters.type==='daddy' ?'active':''}" data-filter="type" data-val="daddy">Daddies</div>
                <div class="chip ${filters.type==='mommy' ?'active':''}" data-filter="type" data-val="mommy">Mommies</div>
                <div class="chip ${filters.type==='sboy'  ?'active':''}" data-filter="type" data-val="sboy">Sugar Boys</div>
                <div class="chip ${filters.type==='sgirl' ?'active':''}" data-filter="type" data-val="sgirl">Sugar Girls</div>
            </div>
        </div>

        <div class="filter-group">
            <span class="filter-label">Ciudad</span>
            <div class="filter-chips">
                <div class="chip ${filters.city==='all'?'active':''}" data-filter="city" data-val="all">Todas</div>
                ${CITIES.map(c => `
                <div class="chip ${filters.city===c?'active':''}" data-filter="city" data-val="${c}">${c}</div>
                `).join('')}
            </div>
        </div>

        <div class="filter-group">
            <span class="filter-label">Rango de edad</span>
            <div class="range-labels">
                <span>${filters.ageMin} años</span>
                <span class="range-val" id="ageDisplay_${Date.now()}">${filters.ageMin}–${filters.ageMax}</span>
                <span>${filters.ageMax} años</span>
            </div>
            <input type="range" min="18" max="65" value="${filters.ageMin}" id="ageMin" step="1">
            <br><br>
            <input type="range" min="18" max="65" value="${filters.ageMax}" id="ageMax" step="1">
        </div>

        <button class="filter-reset" id="resetFilters">
            <i class="fas fa-rotate-left"></i> Limpiar filtros
        </button>
        `;
    }

    function renderFilters() {
        const html = buildFiltersHTML();
        document.getElementById('filterContent').innerHTML = html;
        document.getElementById('filterContentMobile').innerHTML = html;
        attachFilterEvents();
    }

    function attachFilterEvents() {
        // Chips
        document.querySelectorAll('.chip[data-filter]').forEach(chip => {
            chip.addEventListener('click', () => {
                const f = chip.dataset.filter;
                const v = chip.dataset.val;
                filters[f] = v;
                renderFilters();
                renderProfiles();
            });
        });

        // Sliders de edad
        document.querySelectorAll('#ageMin').forEach(el => {
            el.addEventListener('input', function() {
                filters.ageMin = Math.min(parseInt(this.value), filters.ageMax - 1);
                renderFilters(); renderProfiles();
            });
        });
        document.querySelectorAll('#ageMax').forEach(el => {
            el.addEventListener('input', function() {
                filters.ageMax = Math.max(parseInt(this.value), filters.ageMin + 1);
                renderFilters(); renderProfiles();
            });
        });

        // Reset
        document.querySelectorAll('#resetFilters').forEach(el => {
            el.addEventListener('click', () => {
                filters = { type:'all', city:'all', ageMin:18, ageMax:60 };
                renderFilters(); renderProfiles();
            });
        });
    }

    // ================================================================
    //  RENDERIZAR PERFILES
    // ================================================================
    const TYPE_LABELS = { daddy:'Daddy', mommy:'Mommy', sboy:'Sugar Boy', sgirl:'Sugar Girl' };
    const TYPE_BADGE  = { daddy:'badge-daddy', mommy:'badge-mommy', sboy:'badge-sboy', sgirl:'badge-sgirl' };

    function filteredProfiles() {
        let list = [...PROFILES];
        if (filters.type !== 'all') list = list.filter(p => p.type === filters.type);
        if (filters.city !== 'all') list = list.filter(p => p.city === filters.city);
        list = list.filter(p => p.age >= filters.ageMin && p.age <= filters.ageMax);

        const sort = document.getElementById('sortSelect')?.value || 'recientes';
        if (sort === 'edad_asc')  list.sort((a,b) => a.age - b.age);
        if (sort === 'edad_desc') list.sort((a,b) => b.age - a.age);

        return list;
    }

    function renderProfiles() {
        const list  = filteredProfiles();
        const grid  = document.getElementById('profilesGrid');
        const empty = document.getElementById('emptyState');

        document.getElementById('countNum').textContent = list.length;

        if (list.length === 0) {
            grid.innerHTML = '';
            empty.classList.add('visible');
            return;
        }
        empty.classList.remove('visible');

        grid.innerHTML = list.map((p, i) => {
            const isSent = sentRequests.has(p.id);
            const visibleTags = p.tags.slice(0,2);
            const extra = p.tags.length - 2;
            return `
            <div class="profile-card" data-id="${p.id}"
                 style="transition-delay:${i * 0.04}s"
                 onclick="openProfile(${p.id})">
                <div class="card-photo">
                    <img class="card-photo-img" src="${p.photo}" alt="${p.name}" loading="lazy">
                    <div class="card-photo-overlay"></div>
                    <span class="card-type-badge ${TYPE_BADGE[p.type]}">${TYPE_LABELS[p.type]}</span>
                    <button class="card-quick-action ${isSent?'sent':''}"
                            onclick="quickRequest(event, ${p.id})"
                            title="${isSent?'Solicitud enviada':'Enviar solicitud'}">
                        <i class="fas ${isSent?'fa-check':'fa-paper-plane'}"></i>
                    </button>
                </div>
                <div class="card-info">
                    <div class="card-name-row">
                        <span class="card-name">${p.name}</span>
                        <span class="card-age">${p.age}</span>
                    </div>
                    <div class="card-city">
                        <i class="fas fa-location-dot"></i>
                        ${p.city}
                    </div>
                    <div class="card-tags">
                        ${visibleTags.map(t => `<span class="card-tag">${t}</span>`).join('')}
                        ${extra > 0 ? `<span class="card-tag-more">+${extra}</span>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');

        // IntersectionObserver para animación stagger
        document.querySelectorAll('.profile-card').forEach(card => {
            cardIO.observe(card);
        });
    }

    const cardIO = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                e.target.classList.add('visible');
                cardIO.unobserve(e.target);
            }
        });
    }, { threshold: 0.05 });

    // ================================================================
    //  MODAL DE PERFIL
    // ================================================================
    function openProfile(id) {
        const p = PROFILES.find(x => x.id === id);
        if (!p) return;
        currentProfile = p;
        const isSent = sentRequests.has(p.id);

        document.getElementById('modalInner').innerHTML = `
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <img class="modal-photo" src="${p.photo}" alt="${p.name}">
            <div class="modal-body">
                <div class="modal-name-row">
                    <span class="modal-name">${p.name}</span>
                    <span class="modal-age">${p.age} años</span>
                </div>
                <div class="modal-meta">
                    <span class="modal-meta-item">
                        <i class="fas fa-location-dot"></i>${p.city}
                    </span>
                    <span class="modal-meta-item">
                        <i class="fas fa-tag"></i>${TYPE_LABELS[p.type]}
                    </span>
                </div>

                <div class="modal-section-title">Sobre mí</div>
                <p class="modal-bio">${p.bio}</p>

                <div class="modal-section-title">Qué ofrezco</div>
                <div class="modal-tags">
                    ${p.tags.map(t => `<span class="modal-tag">${t}</span>`).join('')}
                </div>

                <div class="modal-section-title">Busco</div>
                <div class="modal-tags">
                    ${p.relation.map(r => `<span class="modal-tag">${r}</span>`).join('')}
                </div>

                <div style="margin-top:28px;">
                    <button class="btn-send ${isSent?'':''}""
                            style="width:100%;padding:16px;font-size:15px;border-radius:50px;"
                            onclick="openRequestModal(${p.id})"
                            ${isSent?'disabled':''}>
                        <i class="fas ${isSent?'fa-check':'fa-paper-plane'}"></i>
                        ${isSent ? 'Solicitud enviada' : 'Enviar solicitud de conexión'}
                    </button>
                </div>
            </div>
        `;

        document.getElementById('profileModal').classList.add('open');
        document.getElementById('modalClose').addEventListener('click', closeProfileModal);
    }

    function closeProfileModal() {
        document.getElementById('profileModal').classList.remove('open');
        currentProfile = null;
    }

    document.getElementById('profileModal').addEventListener('click', function(e) {
        if (e.target === this) closeProfileModal();
    });

    // ================================================================
    //  SOLICITUD RÁPIDA DESDE CARD
    // ================================================================
    function quickRequest(e, id) {
        e.stopPropagation();
        if (sentRequests.has(id)) return;
        currentProfile = PROFILES.find(p => p.id === id);
        openRequestModal(id);
    }

    // ================================================================
    //  MODAL DE SOLICITUD
    // ================================================================
    const MAX_CHARS = 280;

    function openRequestModal(id) {
        const p = PROFILES.find(x => x.id === id);
        if (!p) return;
        currentProfile = p;

        // Cierra modal de perfil si estaba abierto
        document.getElementById('profileModal').classList.remove('open');

        document.getElementById('requestModalInner').innerHTML = `
            <h3>Conectar con ${p.name}</h3>
            <p>Escribe un mensaje breve para presentarte. <strong>${p.name}</strong> decidirá si acepta tu solicitud.</p>
            <textarea class="request-textarea" id="requestMsg"
                      placeholder="Hola ${p.name}, me llamo… me gustaría conectar porque…"
                      maxlength="${MAX_CHARS}"></textarea>
            <div class="request-char" id="charCount">0 / ${MAX_CHARS}</div>
            <div class="request-actions">
                <button class="btn-cancel" id="cancelRequest">Cancelar</button>
                <button class="btn-send" id="confirmRequest" disabled>
                    <i class="fas fa-paper-plane"></i> Enviar
                </button>
            </div>
        `;

        document.getElementById('requestModal').classList.add('open');

        const textarea = document.getElementById('requestMsg');
        const charEl   = document.getElementById('charCount');
        const sendBtn  = document.getElementById('confirmRequest');

        textarea.addEventListener('input', function() {
            const len = this.value.length;
            charEl.textContent = `${len} / ${MAX_CHARS}`;
            charEl.classList.toggle('warn', len > MAX_CHARS * 0.85);
            sendBtn.disabled = len < 20;
        });

        textarea.focus();

        document.getElementById('cancelRequest').addEventListener('click', closeRequestModal);
        document.getElementById('confirmRequest').addEventListener('click', sendRequest);
    }

    function closeRequestModal() {
        document.getElementById('requestModal').classList.remove('open');
    }

    document.getElementById('requestModal').addEventListener('click', function(e) {
        if (e.target === this) closeRequestModal();
    });

    function sendRequest() {
        const msg = document.getElementById('requestMsg').value.trim();
        if (msg.length < 20 || !currentProfile) return;

        const btn = document.getElementById('confirmRequest');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando…';

        // Simula envío (aquí iría Firebase)
        setTimeout(() => {
            sentRequests.add(currentProfile.id);
            closeRequestModal();
            renderProfiles(); // actualiza el ícono en la card
            toast(`Solicitud enviada a ${currentProfile.name} ✓`, 'success');
            currentProfile = null;
        }, 1200);
    }

    // ================================================================
    //  FILTER SHEET MÓVIL
    // ================================================================
    document.getElementById('openFilters').addEventListener('click', () => {
        document.getElementById('filterSheetOverlay').classList.add('open');
    });

    document.getElementById('filterSheetOverlay').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('open');
    });

    // ================================================================
    //  SORT
    // ================================================================
    document.getElementById('sortSelect').addEventListener('change', renderProfiles);

    // ================================================================
    //  TOAST
    // ================================================================
    function toast(msg, type = 'info') {
        document.querySelectorAll('.toast').forEach(t => t.remove());
        const t = document.createElement('div');
        t.className = `toast ${type} hidden`;
        t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i><span>${msg}</span>`;
        document.body.appendChild(t);
        requestAnimationFrame(() => requestAnimationFrame(() => t.classList.remove('hidden')));
        setTimeout(() => {
            t.classList.add('hidden');
            setTimeout(() => t.remove(), 420);
        }, 4000);
    }

    // ================================================================
    //  BARRA DE PROGRESO DE SCROLL
    // ================================================================
    // (reutilizamos la misma lógica de los formularios)

    // ================================================================
    //  INIT
    // ================================================================
    renderFilters();
    renderProfiles();
    </script>
</body>
</html>
