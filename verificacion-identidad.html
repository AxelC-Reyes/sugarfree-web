<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#030305">
    <title>Verificar Identidad · Sugar Free</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getFirestore, doc, updateDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAmG0T27phC-DtXbtg7bP5JgmmyEeNJ-8A",
            authDomain: "sugarfree-cbb21.firebaseapp.com",
            projectId: "sugarfree-cbb21",
            storageBucket: "sugarfree-cbb21.firebasestorage.app",
            messagingSenderId: "797632408987",
            appId: "1:797632408987:web:c96cbbdcf34885d631c53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let ineFile = null;
        let selfieFile = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, 'usuarios', user.uid));
                if (userDoc.exists() && userDoc.data().verificationStatus === 'verificado') {
                    window.location.href = 'index-premium.html?step=profile';
                }
            } else {
                window.location.href = 'index-premium.html';
            }
        });

        function previewImage(input, previewId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(previewId).src = e.target.result;
                    document.getElementById(previewId).style.display = 'block';
                };
                reader.readAsDataURL(file);
                if (input.id === 'ineInput') ineFile = file;
                if (input.id === 'selfieInput') selfieFile = file;
            }
        }

        async function submitVerification() {
            if (!ineFile || !selfieFile) {
                toast('Debes subir ambos documentos', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo documentos...';

            try {
                // Subir INE
                const ineRef = ref(storage, `documentos/${currentUser.uid}/ine.jpg`);
                await uploadBytes(ineRef, ineFile);
                const ineUrl = await getDownloadURL(ineRef);

                // Subir Selfie
                const selfieRef = ref(storage, `documentos/${currentUser.uid}/selfie.jpg`);
                await uploadBytes(selfieRef, selfieFile);
                const selfieUrl = await getDownloadURL(selfieRef);

                // Actualizar estado del usuario
                await updateDoc(doc(db, 'usuarios', currentUser.uid), {
                    verificationStatus: 'pendiente',
                    verificationMethod: 'manual',
                    verificationDate: new Date().toISOString()
                });

                toast('Documentos enviados. Espera la revisión del administrador.', 'success');
                setTimeout(() => {
                    window.location.href = 'index-premium.html?step=profile';
                }, 3000);

            } catch (error) {
                console.error('Error:', error);
                toast('Error al subir documentos', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> Enviar verificación';
            }
        }

        function toast(msg, type) {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${msg}</span>`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        window.previewImage = previewImage;
        window.submitVerification = submitVerification;
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #030305;
            --rose: #FF3B7F;
            --white: #FFFFFF;
            --w80: rgba(255,255,255,0.8);
            --w50: rgba(255,255,255,0.5);
            --w20: rgba(255,255,255,0.2);
            --w10: rgba(255,255,255,0.1);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
        }
        .stars-bg {
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,59,127,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: var(--w50);
            margin-bottom: 40px;
        }
        .upload-area {
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--w20);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .upload-area:hover {
            border-color: var(--rose);
            background: rgba(255,59,127,0.05);
        }
        .upload-area i {
            font-size: 48px;
            color: var(--w50);
            margin-bottom: 12px;
        }
        .upload-area p {
            color: var(--w50);
            font-size: 14px;
        }
        .preview-img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
        }
        .btn-submit {
            width: 100%;
            background: var(--rose);
            border: none;
            padding: 16px;
            border-radius: 50px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8,8,15,0.95);
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            font-size: 14px;
        }
        .toast.success { border: 1px solid #2ecc71; }
        .toast.error { border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="container">
        <h1>Verifica tu identidad</h1>
        <p class="subtitle">Sube tu INE y una selfie para obtener el badge de verificado</p>

        <div class="upload-area" onclick="document.getElementById('ineInput').click()">
            <i class="fas fa-id-card"></i>
            <p>INE / Pasaporte / Licencia de conducir</p>
            <input type="file" id="ineInput" accept="image/*" style="display: none;" onchange="previewImage(this, 'inePreview')">
            <img id="inePreview" class="preview-img">
        </div>

        <div class="upload-area" onclick="document.getElementById('selfieInput').click()">
            <i class="fas fa-camera"></i>
            <p>Selfie (tu foto actual)</p>
            <input type="file" id="selfieInput" accept="image/*" style="display: none;" onchange="previewImage(this, 'selfiePreview')">
            <img id="selfiePreview" class="preview-img">
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitVerification()">
            <i class="fas fa-check"></i> Enviar verificación
        </button>
    </div>
</body>
</html>
