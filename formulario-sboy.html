<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Boy - Completa tu perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getFirestore, doc, setDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAmG0T27phC-DtXbtg7bP5JgmmyEeNJ-8A",
            authDomain: "sugarfree-cbb21.firebaseapp.com",
            projectId: "sugarfree-cbb21",
            storageBucket: "sugarfree-cbb21.firebasestorage.app",
            messagingSenderId: "797632408987",
            appId: "1:797632408987:web:c96cbbdcf34885d631c53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                window.location.href = 'index.html';
            }
        });

        window.__firebase = { auth, db, storage, getCurrentUser: () => currentUser };
    </script>

    <style>
        /* Tus estilos originales (no los cambio) */
        :root {
            --primary-color: #FF4D8D;
            --secondary-color: #9C27B0;
            --accent-color: #FF9800;
            --dark-color: #1A1A2E;
            --light-color: #F8F9FA;
            --transition: all 0.3s ease;
            --border-radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            color: var(--light-color);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .form-section { margin-bottom: 40px; }
        .form-section h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }
        .form-control {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        select.form-control { appearance: none; cursor: pointer; }
        .photos-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 10px;
        }
        .photo-upload {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .photo-upload i { font-size: 32px; color: rgba(255, 255, 255, 0.5); margin-bottom: 10px; }
        .photo-upload span { font-size: 14px; color: rgba(255, 255, 255, 0.6); }
        .photo-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .btn {
            padding: 16px 40px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 30px auto 0;
            display: block;
        }
        .age-note {
            background: rgba(255, 152, 0, 0.1);
            border-left: 4px solid var(--accent-color);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .photos-container { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 25px; }
        }
        @media (max-width: 480px) {
            .photos-container { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-crown"></i> Sugar Boy</h1>
            <p>Completa tu perfil para encontrar tu Sugar ideal</p>
        </div>

        <form id="profileForm">
            <!-- Información Básica -->
            <div class="form-section">
                <h2><i class="fas fa-user-circle"></i> Información Básica</h2>
                <div class="form-group">
                    <label for="edad">Edad *</label>
                    <input type="number" id="edad" class="form-control" min="18" max="30" required>
                    <div class="age-note"><i class="fas fa-info-circle"></i> Para Sugar Boys, la edad mínima es 18 años</div>
                </div>
                <div class="form-group">
                    <label for="altura">Altura (cm) *</label>
                    <input type="number" id="altura" class="form-control" min="140" max="220" step="0.1" required>
                </div>
                <div class="form-group">
                    <label for="peso">Peso (kg) *</label>
                    <input type="number" id="peso" class="form-control" min="40" max="200" step="0.1" required>
                </div>
                <div class="form-group">
                    <label for="complexion">Complexión *</label>
                    <div class="select-wrapper">
                        <select id="complexion" class="form-control" required>
                            <option value="">Selecciona tu complexión</option>
                            <option value="delgada">Delgada</option>
                            <option value="atletica">Atlética</option>
                            <option value="media">Media</option>
                            <option value="robusta">Robusta</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tono-piel">Tono de Piel *</label>
                    <div class="select-wrapper">
                        <select id="tono-piel" class="form-control" required>
                            <option value="">Selecciona tu tono</option>
                            <option value="muy-clara">Muy Clara</option>
                            <option value="clara">Clara</option>
                            <option value="morena-clara">Morena Clara</option>
                            <option value="morena">Morena</option>
                            <option value="morena-oscura">Morena Oscura</option>
                            <option value="negra">Negra</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Fotos -->
            <div class="form-section">
                <h2><i class="fas fa-camera"></i> Fotos Recientes *</h2>
                <p style="margin-bottom: 20px; color: rgba(255,255,255,0.7);">Sube 3 fotos recientes donde se te vea claramente</p>
                <div class="photos-container">
                    <div class="photo-upload" id="photo1">
                        <i class="fas fa-plus-circle"></i><span>Foto 1</span>
                        <input type="file" accept="image/*" class="photo-input" style="display: none;">
                        <img class="photo-preview" alt="Preview">
                    </div>
                    <div class="photo-upload" id="photo2">
                        <i class="fas fa-plus-circle"></i><span>Foto 2</span>
                        <input type="file" accept="image/*" class="photo-input" style="display: none;">
                        <img class="photo-preview" alt="Preview">
                    </div>
                    <div class="photo-upload" id="photo3">
                        <i class="fas fa-plus-circle"></i><span>Foto 3</span>
                        <input type="file" accept="image/*" class="photo-input" style="display: none;">
                        <img class="photo-preview" alt="Preview">
                    </div>
                </div>
            </div>

            <!-- Preferencias -->
            <div class="form-section">
                <h2><i class="fas fa-heart"></i> Preferencias</h2>
                <div class="form-group">
                    <label for="busco">Busco a un Sugar Baby *</label>
                    <div class="select-wrapper">
                        <select id="busco" class="form-control" required>
                            <option value="mujer">Sugar Daddy</option>
                            <option value="hombre">Sugar Mommy</option>
                            <option value="ambos">Ambos</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="expectativas">¿Qué esperas de esta relación?</label>
                    <textarea id="expectativas" class="form-control" rows="4" placeholder="Comparte tus expectativas e intereses..."></textarea>
                </div>
            </div>

            <button type="submit" class="btn"><i class="fas fa-check-circle"></i> Completar Perfil</button>
        </form>
    </div>

    <script>
        // Previsualización de fotos
        document.querySelectorAll('.photo-upload').forEach((upload) => {
            const input = upload.querySelector('.photo-input');
            const preview = upload.querySelector('.photo-preview');
            upload.addEventListener('click', () => input.click());
            input.addEventListener('change', function(e) {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                        upload.querySelector('i').style.display = 'none';
                        upload.querySelector('span').style.display = 'none';
                    }
                    reader.readAsDataURL(file);
                }
            });
        });

        // Función toast
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; top: 20px; right: 20px; background: ${type === 'success' ? 'rgba(76, 175, 80, 0.9)' : type === 'error' ? 'rgba(244, 67, 54, 0.9)' : 'rgba(33, 150, 243, 0.9)'};
                color: white; padding: 15px 20px; border-radius: 12px; z-index: 10000; transform: translateX(100%); transition: transform 0.3s ease;
                display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); max-width: 300px;
            `;
            notification.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(notification);
            setTimeout(() => notification.style.transform = 'translateX(0)', 10);
            setTimeout(() => {
                notification.style.transform = 'translateX(100%)';
                setTimeout(() => notification.remove(), 300);
            }, 4000);
        }

        // Envío del formulario a Firebase
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const firebase = window.__firebase;
            const user = firebase.getCurrentUser();
            if (!user) {
                showNotification('Debes iniciar sesión', 'error');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            // Validar campos
            const edad = parseInt(document.getElementById('edad').value);
            const altura = parseInt(document.getElementById('altura').value);
            const peso = parseInt(document.getElementById('peso').value);
            const complexion = document.getElementById('complexion').value;
            const tonoPiel = document.getElementById('tono-piel').value;
            const busco = document.getElementById('busco').value;
            const expectativas = document.getElementById('expectativas').value;

            if (edad < 18) { showNotification('Edad mínima 18 años', 'error'); return; }
            if (!altura || !peso || !complexion || !tonoPiel || !busco) { showNotification('Completa todos los campos', 'error'); return; }

            const fotosSlots = document.querySelectorAll('.photo-preview[style*="display: block"]');
            if (fotosSlots.length < 3) { showNotification('Sube las 3 fotos requeridas', 'error'); return; }

            const btn = this.querySelector('.btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo fotos...';

            try {
                // Subir fotos a Storage
                const fotosUrls = [];
                const slots = document.querySelectorAll('.photo-upload');
                for (let i = 0; i < slots.length; i++) {
                    const slot = slots[i];
                    const fileInput = slot.querySelector('.photo-input');
                    if (fileInput.files && fileInput.files[0]) {
                        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Subiendo foto ${i+1}/3...`;
                        const file = fileInput.files[0];
                        const extension = file.name.split('.').pop();
                        const fileName = `fotos/${user.uid}/${Date.now()}_${i}.${extension}`;
                        const storageRef = ref(firebase.storage, fileName);
                        await uploadBytes(storageRef, file);
                        const url = await getDownloadURL(storageRef);
                        fotosUrls.push(url);
                    }
                }

                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando perfil...';

                // Guardar perfil en Firestore
                const profileRef = doc(firebase.db, 'perfiles', user.uid);
                await setDoc(profileRef, {
                    userId: user.uid,
                    role: 'sboy',
                    edad: edad,
                    altura: altura,
                    peso: peso,
                    complexion: complexion,
                    tonoPiel: tonoPiel,
                    ciudad: '', // El formulario no tiene ciudad, se puede agregar después
                    bio: expectativas || '',
                    fotos: fotosUrls,
                    busca: busco,
                    profileCompleted: true,
                    fechaPerfil: new Date().toISOString()
                });

                // Actualizar usuario
                const userRef = doc(firebase.db, 'usuarios', user.uid);
                await updateDoc(userRef, {
                    role: 'sboy',
                    profileCompleted: true
                });

                btn.innerHTML = '<i class="fas fa-check"></i> ¡Perfil Completado!';
                btn.style.background = 'linear-gradient(to right, #4CAF50, #2E7D32)';
                showNotification('Perfil guardado correctamente', 'success');

                setTimeout(() => {
                    window.location.href = 'listing.html';
                }, 2000);

            } catch (error) {
                console.error(error);
                showNotification('Error al guardar. Intenta de nuevo.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Completar Perfil';
            }
        });
    </script>
</body>
</html>
