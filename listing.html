<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="theme-color" content="#030305">
    <title>Explorar · Sugar Free </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs, orderBy, limit, doc, getDoc, updateDoc, addDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
        import { getStorage, ref, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAmG0T27phC-DtXbtg7bP5JgmmyEeNJ-8A",
            authDomain: "sugarfree-cbb21.firebaseapp.com",
            projectId: "sugarfree-cbb21",
            storageBucket: "sugarfree-cbb21.firebasestorage.app",
            messagingSenderId: "797632408987",
            appId: "1:797632408987:web:c96cbbdcf34885d631c53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let currentUserRole = null;
        let currentUserPremium = false;

        window.__firebase = { auth, db, storage, getCurrentUser: () => currentUser };

        // Función para obtener qué roles puede ver el usuario actual
        function getVisibleRoles(myRole) {
            switch (myRole) {
                case 'daddy': return ['sboy', 'sgirl'];
                case 'mommy': return ['sboy', 'sgirl'];
                case 'sboy': return ['daddy', 'mommy'];
                case 'sgirl': return ['daddy', 'mommy'];
                default: return [];
            }
        }

        // Función para obtener nombre legible del rol
        function getRoleName(role) {
            const names = { daddy: 'Sugar Daddy', mommy: 'Sugar Mommy', sboy: 'Sugar Boy', sgirl: 'Sugar Girl' };
            return names[role] || role;
        }

        window.getVisibleRoles = getVisibleRoles;
        window.getRoleName = getRoleName;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                console.log('✅ Usuario autenticado:', user.uid);
                
                // Obtener rol del usuario desde Firestore
                const userDoc = await getDoc(doc(db, 'usuarios', user.uid));
                if (userDoc.exists()) {
                    currentUserRole = userDoc.data().role;
                    currentUserPremium = userDoc.data().premium || false;
                    console.log('📌 Rol del usuario:', currentUserRole);
                    console.log('💎 Premium:', currentUserPremium);
                    
                    // Disparar evento de carga de perfiles
                    window.dispatchEvent(new CustomEvent('userLoaded', { 
                        detail: { role: currentUserRole, premium: currentUserPremium, user: user }
                    }));
                } else {
                    window.location.href = 'index-premium.html';
                }
            } else {
                window.location.href = 'index-premium.html';
            }
        });

        window.__auth = auth;
        window.__db = db;
    </script>

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg:        #030305;
            --rose:      #FF3B7F;
            --rose-dim:  rgba(255,59,127,0.15);
            --rose-line: rgba(255,59,127,0.12);
            --gold:      #C9A96E;
            --white:     #FFFFFF;
            --w80:       rgba(255,255,255,0.8);
            --w50:       rgba(255,255,255,0.5);
            --w20:       rgba(255,255,255,0.2);
            --w10:       rgba(255,255,255,0.1);
            --w06:       rgba(255,255,255,0.06);
            --w04:       rgba(255,255,255,0.04);
            --ease:      cubic-bezier(0.16,1,0.3,1);
            --nav-h:     70px;
            --safe-top:    env(safe-area-inset-top,    0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left:   env(safe-area-inset-left,   0px);
            --safe-right:  env(safe-area-inset-right,  0px);
        }

        html { overflow-x: hidden; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
        }

        /* Fondo de estrellas */
        .geo-bg {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }
        .geo-bg::before {
            content: '';
            position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,59,127,0.14) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse 90% 90% at 50% 0%, black 20%, transparent 100%);
        }
        .ambient {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
            background: radial-gradient(ellipse 50% 30% at 90% 5%, rgba(255,59,127,0.06) 0%, transparent 70%);
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + var(--safe-top));
            padding-top: var(--safe-top);
            background: rgba(3,3,5,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--rose-line);
            z-index: 200;
        }

        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 clamp(16px,3vw,40px);
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 38px; height: 38px;
            background: var(--rose-dim);
            border: 1px solid var(--rose);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--rose);
        }
        .nav-logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--rose));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s;
        }
        .nav-btn-ghost {
            background: transparent;
            border: 1px solid var(--w10);
            color: var(--w80);
        }
        .nav-btn-primary {
            background: var(--rose);
            border: none;
            color: #fff;
        }
        .nav-btn-primary:hover { background: #ff2070; }

        /* Layout principal */
        .page {
            position: relative;
            z-index: 10;
            padding-top: calc(var(--nav-h) + var(--safe-top));
            min-height: 100vh;
        }

        .page-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px clamp(16px,3vw,40px) 80px;
        }

        /* Header de resultados */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .results-count {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }
        .results-count span { color: var(--rose); }

        .role-badge {
            background: var(--rose-dim);
            border: 1px solid var(--rose);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            color: var(--rose);
        }

        /* Grid de perfiles */
        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Card de perfil */
        .profile-card {
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            opacity: 0;
            transform: translateY(16px);
        }

        .profile-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .profile-card:hover {
            border-color: var(--rose);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(255,59,127,0.15);
        }

        .card-photo {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
        }

        .card-photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .profile-card:hover .card-photo-img {
            transform: scale(1.05);
        }

        .card-photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(3,3,5,0.8) 100%);
        }

        .card-type-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(8px);
        }

        .badge-sugar { background: rgba(201,169,110,0.2); border: 1px solid var(--gold); color: var(--gold); }
        .badge-baby { background: var(--rose-dim); border: 1px solid var(--rose); color: var(--rose); }

        .card-info {
            padding: 16px;
        }

        .card-name-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .card-name {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        .card-age {
            font-size: 14px;
            color: var(--w50);
        }

        .card-city {
            font-size: 13px;
            color: var(--w50);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .card-city i { color: var(--rose); font-size: 10px; }

        .card-bio {
            font-size: 13px;
            color: var(--w70);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .request-btn {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
            background: var(--rose);
            border: none;
            border-radius: 50px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }

        .request-btn:hover {
            background: #ff2070;
        }

        .request-btn.sent {
            background: rgba(46,204,113,0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        /* Estado vacío */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            display: none;
        }
        .empty-state.visible { display: block; }
        .empty-state i {
            font-size: 64px;
            color: var(--w20);
            margin-bottom: 20px;
        }
        .empty-state h3 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .empty-state p { color: var(--w50); }

        /* Modal de solicitud */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #0a0a12;
            border: 1px solid var(--rose-line);
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            padding: 28px;
            animation: modalIn 0.3s var(--ease);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal h3 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .modal textarea {
            width: 100%;
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            resize: none;
            min-height: 100px;
            margin: 16px 0;
        }

        .modal textarea:focus {
            outline: none;
            border-color: var(--rose);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--w20);
            color: var(--w80);
        }

        .btn-send {
            background: var(--rose);
            border: none;
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8,8,15,0.95);
            border: 1px solid var(--rose-line);
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            font-size: 14px;
            animation: toastIn 0.3s ease;
        }

        .toast.success i { color: #2ecc71; }
        .toast.error i { color: #ff4444; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }
        .loading-spinner i {
            font-size: 40px;
            color: var(--rose);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .profiles-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .card-name { font-size: 16px; }
        }

        @media (max-width: 480px) {
            .profiles-grid { grid-template-columns: 1fr; }
            .results-count { font-size: 20px; }
        }
    </style>
</head>

    <div class="page">
        <div class="page-inner">

            <div class="results-header">
                <div class="results-count">
                    <span id="profileCount">0</span> perfiles encontrados
                </div>

    <!-- Modal de solicitud -->
    <div id="requestModal" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitle">Enviar solicitud</h3>
            <textarea id="requestMessage" placeholder="Escribe un mensaje para presentarte... (mínimo 20 caracteres)" maxlength="280"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelRequest">Cancelar</button>
                <button class="btn-send" id="sendRequest">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let currentUserId = null;
        let currentUserRole = null;
        let currentUserPremium = false;
        let allProfiles = [];
        let sentRequests = new Set();

        // Elementos DOM
        const profilesGrid = document.getElementById('profilesGrid');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const emptyState = document.getElementById('emptyState');
        const profileCountSpan = document.getElementById('profileCount');
        const roleBadge = document.getElementById('roleBadge');
        const logoutBtn = document.getElementById('logoutBtn');

        // Modal elements
        const requestModal = document.getElementById('requestModal');
        const modalTitle = document.getElementById('modalTitle');
        const requestMessage = document.getElementById('requestMessage');
        const cancelRequestBtn = document.getElementById('cancelRequest');
        const sendRequestBtn = document.getElementById('sendRequest');

        let selectedProfileId = null;
        let selectedProfileName = null;

        // Función para obtener nombre legible del rol
        function getRoleName(role) {
            const names = { daddy: 'Sugar Daddy', mommy: 'Sugar Mommy', sboy: 'Sugar Boy', sgirl: 'Sugar Girl' };
            return names[role] || role;
        }

        // Función para obtener badge CSS según rol
        function getBadgeClass(role) {
            return (role === 'daddy' || role === 'mommy') ? 'badge-sugar' : 'badge-baby';
        }

        // Cargar perfiles desde Firestore
        async function loadProfiles() {
            const visibleRoles = window.getVisibleRoles(currentUserRole);
            
            if (visibleRoles.length === 0) {
                loadingSpinner.style.display = 'none';
                emptyState.classList.add('visible');
                return;
            }

            try {
                const perfilesRef = collection(window.__db, 'perfiles');
                const q = query(
                    perfilesRef,
                    where('role', 'in', visibleRoles),
                    where('profileCompleted', '==', true),
                    orderBy('fechaPerfil', 'desc'),
                    limit(50)
                );
                
                const querySnapshot = await getDocs(q);
                const profiles = [];
                
                for (const docSnap of querySnapshot.docs) {
                    const data = docSnap.data();
                    const userDoc = await getDoc(doc(window.__db, 'usuarios', data.userId));
                    const userData = userDoc.exists() ? userDoc.data() : {};
                    
                    profiles.push({
                        id: docSnap.id,
                        userId: data.userId,
                        nombre: userData.nombre || data.nombre || 'Usuario',
                        edad: data.edad,
                        ciudad: data.ciudad,
                        bio: data.bio || '',
                        fotos: data.fotos || [],
                        role: data.role,
                        verificationStatus: data.verificationStatus || 'no_verificado'
                    });
                }
                
                allProfiles = profiles;
                profileCountSpan.textContent = profiles.length;
                
                if (profiles.length === 0) {
                    loadingSpinner.style.display = 'none';
                    emptyState.classList.add('visible');
                    profilesGrid.innerHTML = '';
                } else {
                    emptyState.classList.remove('visible');
                    renderProfiles(profiles);
                }
                
            } catch (error) {
                console.error('Error al cargar perfiles:', error);
                toast('Error al cargar perfiles', 'error');
            } finally {
                loadingSpinner.style.display = 'none';
            }
        }

        // Renderizar perfiles
        function renderProfiles(profiles) {
            profilesGrid.innerHTML = profiles.map((profile, index) => {
                const fotoPrincipal = profile.fotos && profile.fotos.length > 0 ? profile.fotos[0] : null;
                const isSent = sentRequests.has(profile.userId);
                const roleName = getRoleName(profile.role);
                const badgeClass = getBadgeClass(profile.role);
                
                return `
                    <div class="profile-card" data-userid="${profile.userId}" style="transition-delay: ${index * 0.03}s">
                        <div class="card-photo">
                            ${fotoPrincipal ? 
                                `<img class="card-photo-img" src="${fotoPrincipal}" alt="${profile.nombre}" loading="lazy">` :
                                `<div class="card-photo-img" style="background: linear-gradient(135deg, var(--rose-dim), var(--w04)); display: flex; align-items: center; justify-content: center;">
                                    <i class="fas fa-user" style="font-size: 48px; color: var(--w20);"></i>
                                </div>`
                            }
                            <div class="card-photo-overlay"></div>
                            <span class="card-type-badge ${badgeClass}">${roleName}</span>
                        </div>
                        <div class="card-info">
                            <div class="card-name-row">
                                <span class="card-name">${profile.nombre}</span>
                                <span class="card-age">${profile.edad} años</span>
                            </div>
                            <div class="card-city">
                                <i class="fas fa-location-dot"></i> ${profile.ciudad || 'No especificada'}
                            </div>
                            <div class="card-bio">${profile.bio || 'Sin descripción aún'}</div>
                            <button class="request-btn ${isSent ? 'sent' : ''}" data-userid="${profile.userId}" data-name="${profile.nombre}">
                                <i class="fas ${isSent ? 'fa-check' : 'fa-paper-plane'}"></i>
                                ${isSent ? 'Solicitud enviada' : 'Enviar solicitud'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Animar cards con IntersectionObserver
            const cards = document.querySelectorAll('.profile-card');
            const cardObserver = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        cardObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.05 });
            
            cards.forEach(card => cardObserver.observe(card));

            // Event listeners para botones de solicitud
            document.querySelectorAll('.request-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const userId = btn.dataset.userid;
                    const userName = btn.dataset.name;
                    openRequestModal(userId, userName);
                });
            });

            // Event listeners para cards (ver detalle)
            document.querySelectorAll('.profile-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('request-btn')) {
                        const userId = card.dataset.userid;
                        showProfileDetail(userId);
                    }
                });
            });
        }

        // Mostrar detalle del perfil (modal)
        async function showProfileDetail(userId) {
            const profile = allProfiles.find(p => p.userId === userId);
            if (!profile) return;
            
            const fotoPrincipal = profile.fotos && profile.fotos.length > 0 ? profile.fotos[0] : null;
            const roleName = getRoleName(profile.role);
            
            const modalContent = `
                <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 400; display: flex; align-items: center; justify-content: center; padding: 20px;" onclick="this.remove()">
                    <div style="background: #0a0a12; border-radius: 24px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--rose-line);" onclick="event.stopPropagation()">
                        ${fotoPrincipal ? 
                            `<img src="${fotoPrincipal}" style="width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 20px 20px 0 0;" alt="${profile.nombre}">` :
                            `<div style="width: 100%; aspect-ratio: 1/1; background: linear-gradient(135deg, var(--rose-dim), var(--w04)); display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-user" style="font-size: 80px; color: var(--w20);"></i>
                            </div>`
                        }
                        <div style="padding: 24px;">
                            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;">
                                <h2 style="font-family: 'Syne', sans-serif; font-size: 28px;">${profile.nombre}</h2>
                                <span style="font-size: 18px; color: var(--w50);">${profile.edad} años</span>
                            </div>
                            <div style="display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;">
                                <span style="background: var(--rose-dim); padding: 5px 12px; border-radius: 50px; font-size: 12px;">${roleName}</span>
                                <span><i class="fas fa-location-dot" style="color: var(--rose);"></i> ${profile.ciudad || 'No especificada'}</span>
                            </div>
                            <div style="border-top: 1px solid var(--w10); padding-top: 20px;">
                                <h3 style="font-family: 'Syne', sans-serif; font-size: 14px; color: var(--rose); margin-bottom: 12px;">SOBRE MÍ</h3>
                                <p style="line-height: 1.6; color: var(--w80);">${profile.bio || 'Sin descripción aún'}</p>
                            </div>
                            <button onclick="document.querySelector('.modal-overlay').style.display='none'" style="width: 100%; margin-top: 24px; padding: 14px; background: var(--rose); border: none; border-radius: 50px; color: white; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer;">Cerrar</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalContent);
        }

        // Abrir modal de solicitud
        function openRequestModal(userId, userName) {
            selectedProfileId = userId;
            selectedProfileName = userName;
            modalTitle.textContent = `Conectar con ${userName}`;
            requestMessage.value = '';
            requestModal.classList.add('open');
        }

        // Enviar solicitud
        async function sendRequest() {
            const message = requestMessage.value.trim();
            if (message.length < 20) {
                toast('El mensaje debe tener al menos 20 caracteres', 'error');
                return;
            }

            sendRequestBtn.disabled = true;
            sendRequestBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

            try {
                const solicitudRef = collection(window.__db, 'solicitudes');
                const userDoc = await getDoc(doc(window.__db, 'usuarios', currentUserId));
                const userData = userDoc.data();
                
                await addDoc(solicitudRef, {
                    emisorId: currentUserId,
                    emisorNombre: userData.nombre || 'Usuario',
                    receptorId: selectedProfileId,
                    receptorNombre: selectedProfileName,
                    mensaje: message,
                    estado: 'pendiente',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });
                
                sentRequests.add(selectedProfileId);
                toast(`Solicitud enviada a ${selectedProfileName} ✓`, 'success');
                requestModal.classList.remove('open');
                loadProfiles(); // Recargar para actualizar el estado del botón
                
            } catch (error) {
                console.error('Error al enviar solicitud:', error);
                toast('Error al enviar solicitud', 'error');
            } finally {
                sendRequestBtn.disabled = false;
                sendRequestBtn.innerHTML = 'Enviar';
            }
        }

        // Cerrar modal
        function closeModal() {
            requestModal.classList.remove('open');
        }

        // Cerrar sesión
        async function logout() {
            await window.__auth.signOut();
            window.location.href = 'index-premium.html';
        }

        // Toast
        function toast(msg, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toastEl = document.createElement('div');
            toastEl.className = `toast ${type}`;
            toastEl.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${msg}</span>`;
            document.body.appendChild(toastEl);
            
            setTimeout(() => {
                toastEl.remove();
            }, 3000);
        }

        // Eventos
        window.addEventListener('userLoaded', (event) => {
            currentUserId = event.detail.user.uid;
            currentUserRole = event.detail.role;
            currentUserPremium = event.detail.premium;
            
            roleBadge.textContent = `${getRoleName(currentUserRole)} · ${currentUserPremium ? '✨ Premium' : '⭐ Free'}`;
            loadProfiles();
        });

        logoutBtn?.addEventListener('click', logout);
        cancelRequestBtn?.addEventListener('click', closeModal);
        sendRequestBtn?.addEventListener('click', sendRequest);
        
        // Cerrar modal al hacer clic fuera
        requestModal?.addEventListener('click', (e) => {
            if (e.target === requestModal) closeModal();
        });

        window.showProfileDetail = showProfileDetail;

        const adminEmails = ['axelcazaresreyes@gmail.com']; // Cambia por tu correo

        onAuthStateChanged(auth, (user) => {
        if (user && adminEmails.includes(user.email)) {
            const adminLink = document.getElementById('adminLink');
            if (adminLink) adminLink.style.display = 'flex';
        }
     });
    </script>
</body>
</html>
