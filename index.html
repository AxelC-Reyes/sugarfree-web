  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    :root {
      --bg-deep: #030305;
      --rose: #FF3B7F;
      --white: #FFFFFF;
      --w80: rgba(255,255,255,0.8);
      --w50: rgba(255,255,255,0.5);
      --ease: cubic-bezier(0.16,1,0.3,1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html { overflow-x: hidden; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-deep);
      color: var(--white);
      min-height: 100vh; min-height: 100dvh;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #starsCanvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .chip-lines {
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent 0, transparent 45px, rgba(255,59,127,0.02) 45px, rgba(255,59,127,0.02) 46px),
        repeating-linear-gradient(-45deg, transparent 0, transparent 45px, rgba(255,59,127,0.02) 45px, rgba(255,59,127,0.02) 46px);
      pointer-events: none; z-index: 1; opacity: 0.5;
    }

    .page {
      position: relative; z-index: 10;
      width: 100%; max-width: 800px;
      padding: clamp(16px, 5vw, 40px);
      padding-left: calc(clamp(16px,4vw,40px) + var(--safe-left));
      padding-right: calc(clamp(16px,4vw,40px) + var(--safe-right));
      padding-bottom: calc(clamp(20px,5vw,48px) + var(--safe-bottom));
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
    }

    /* TÍTULO 8BITS */
    .pixel-title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(26px, 8vw, 60px);
      color: var(--white);
      text-shadow: 0 0 12px rgba(255,59,127,0.8), 0 0 24px rgba(255,59,127,0.5);
      letter-spacing: 3px;
      margin-bottom: 28px;
      word-break: break-word;
      line-height: 1.3;
    }

    /* LOGO PRINCIPAL (IMAGEN COMO BOTÓN) */
    .logo-main {
      height: auto;
      width: 80px;           /* ~3cm en pantallas */
      max-width: 100%;
      margin-bottom: 32px;
      cursor: pointer;
      filter: drop-shadow(0 0 14px rgba(255,59,127,0.5));
      transition: transform 0.3s var(--ease), filter 0.3s;
      user-select: none;
      background: transparent;
      border: none;
      padding: 0;
    }
    .logo-main:hover {
      transform: scale(1.06);
      filter: drop-shadow(0 0 20px rgba(255,59,127,0.8));
    }

    /* SECCIÓN MINI JUEGO */
    .mini-game-section {
      margin: 18px 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .mini-game-label {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 5px;
      color: var(--rose);
      margin-bottom: 18px;
    }

    /* BOTÓN JUGAR: TRANSPARENTE, BORDES BLANCOS, SIN EMOJI */
    .play-game-btn {
      background: transparent;
      color: var(--white);
      border: 2px solid var(--white);
      border-radius: 60px;
      padding: 18px 52px;
      font-size: 34px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      backdrop-filter: blur(4px);
      margin-bottom: 50px;   /* ~5 cm visuales */
      background: rgba(255,255,255,0.02);
      text-transform: uppercase;
      box-shadow: 0 8px 20px rgba(255,255,255,0.08);
    }
    .play-game-btn:hover {
      background: rgba(255,59,127,0.08);
      border-color: var(--rose);
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(255,59,127,0.2);
    }
    .play-game-btn:active {
      transform: scale(0.96);
      background: rgba(255,255,255,0.05);
    }

    /* BANNERS INFERIORES: LAS IMÁGENES SON LOS BOTONES (SIN AURA, SIN FONDO) */
    .banners-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 36px;
      width: 100%;
      margin-top: 8px;
    }

    /* Cada botón es únicamente la imagen, sin decoración extra */
    .banner-img-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 6px;
      transition: transform 0.25s ease, filter 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 90px;            /* tamaño base ~3cm */
      max-width: 30vw;
    }
    .banner-img-btn img {
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
      transition: filter 0.2s;
    }
    .banner-img-btn:hover {
      transform: translateY(-5px);
    }
    .banner-img-btn:hover img {
      filter: drop-shadow(0 6px 16px rgba(255,59,127,0.45));
    }
    .banner-label {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.5px;
      color: var(--w80);
    }
    .banner-sub {
      font-size: 10px;
      color: var(--w50);
      letter-spacing: 1px;
      margin-top: -6px;
    }

    /* OCULTAR ELEMENTOS ANTIGUOS */
    .header, .steps-indicator, .step, .hero, .google-btn, .premium-badge, .user-pill {
      display: none !important;
    }

    /* TOAST */
    .toast-el {
      position: fixed; z-index: 10001; font-family: 'Space Grotesk', sans-serif; font-size: 14px;
      background: rgba(8,8,12,0.97); border-radius: 50px; padding: 13px 20px;
      display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      transition: transform 0.4s var(--ease), opacity 0.4s; max-width: calc(100vw - 32px);
    }
    .toast-el.success { border: 1px solid rgba(46,204,113,0.4); }
    .toast-el.success i { color: #2ecc71; }
    .toast-el.error { border: 1px solid rgba(255,60,60,0.4); }
    .toast-el.error i { color: #ff4444; }
    .toast-el.info { border: 1px solid rgba(255,59,127,0.3); }
    .toast-el.info i { color: var(--rose); }
    @media (min-width:481px) {
      .toast-el { top: 24px; right: 20px; }
      .toast-el.hidden { transform: translateX(120%); opacity: 0; }
    }
    @media (max-width:480px) {
      .toast-el { bottom: calc(20px + var(--safe-bottom)); left:16px; right:16px; border-radius:14px; }
      .toast-el.hidden { transform: translateY(120%); opacity: 0; }
    }

    /* Ajustes móviles */
    @media (max-width: 600px) {
      .banners-row { gap: 22px; }
      .banner-img-btn { width: 80px; }
      .play-game-btn { padding: 16px 40px; font-size: 28px; }
    }
  </style>

  <script>
    (function() {
      // ========== ESTRELLAS ==========
      const canvas = document.getElementById('starsCanvas');
      const ctx = canvas.getContext('2d');
      const isMobile = () => window.innerWidth <= 768;
      const LAYOUT_DESKTOP = [
        {count:500, speedMin:.04, speedMax:.11, sizeMin:.3, sizeMax:.75, opMin:.2, opMax:.45},
        {count:300, speedMin:.13, speedMax:.26, sizeMin:.7, sizeMax:1.2, opMin:.4, opMax:.75},
        {count:100, speedMin:.28, speedMax:.48, sizeMin:1.1, sizeMax:1.7, opMin:.7, opMax:1}
      ];
      const LAYOUT_MOBILE = [
        {count:180, speedMin:.04, speedMax:.10, sizeMin:.3, sizeMax:.7, opMin:.2, opMax:.4},
        {count:90,  speedMin:.12, speedMax:.24, sizeMin:.6, sizeMax:1.1, opMin:.4, opMax:.7},
        {count:30,  speedMin:.26, speedMax:.44, sizeMin:1,  sizeMax:1.5, opMin:.7, opMax:1}
      ];
      let stars = [], animationFrame;
      const random = (min, max) => min + Math.random() * (max - min);

      function createStar(l) {
        return {
          x: random(0, canvas.width), y: random(0, canvas.height),
          size: random(l.sizeMin, l.sizeMax), speed: random(l.speedMin, l.speedMax),
          opacity: random(l.opMin, l.opMax), phase: Math.random() * Math.PI * 2,
          pulseSpeed: 0.0003 + Math.random() * 0.0004, pulseAmount: 0.05 + Math.random() * 0.05,
          isPink: Math.random() < 0.07
        };
      }
      function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        (isMobile() ? LAYOUT_MOBILE : LAYOUT_DESKTOP).forEach(l => {
          for (let i = 0; i < l.count; i++) stars.push(createStar(l));
        });
      }
      function drawStars(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
          s.x -= s.speed;
          if (s.x < -4) { s.x = canvas.width + 2; s.y = random(0, canvas.height); }
          const a = Math.min(1, Math.max(0, s.opacity + Math.sin(t * s.pulseSpeed + s.phase) * s.pulseAmount));
          ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = s.isPink ? `rgba(255,180,200,${a})` : `rgba(255,255,255,${a})`;
          ctx.fill();
          if (!isMobile() && s.size > 1.4) {
            const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 1.8);
            g.addColorStop(0, s.isPink ? `rgba(255,100,150,${a * 0.22})` : `rgba(255,255,255,${a * 0.16})`);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 1.8, 0, Math.PI * 2);
            ctx.fillStyle = g; ctx.fill();
          }
        });
        animationFrame = requestAnimationFrame(drawStars);
      }
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(animationFrame);
        else animationFrame = requestAnimationFrame(drawStars);
      });
      window.addEventListener('resize', () => {
        clearTimeout(window._resizeT); window._resizeT = setTimeout(initStars, 180);
      });
      initStars(); animationFrame = requestAnimationFrame(drawStars);

      // ========== TOAST ==========
      function toast(msg, type = 'info') {
        document.querySelectorAll('.toast-el').forEach(t => t.remove());
        const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' };
        const el = document.createElement('div');
        el.className = `toast-el ${type} hidden`;
        el.innerHTML = `<i class="fas fa-${icons[type] || 'info-circle'}"></i><span>${msg}</span>`;
        document.body.appendChild(el);
        requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.remove('hidden')); });
        setTimeout(() => { el.classList.add('hidden'); setTimeout(() => el.remove(), 420); }, 4500);
      }

      // ========== EVENTOS ==========
      document.getElementById('playGameBtn')?.addEventListener('click', () => {
        toast('El mini juego estará disponible pronto en la app.', 'info');
      });

      document.getElementById('logoRedirect')?.addEventListener('click', () => {
        toast('La app de εtεrεo llegará pronto.', 'info');
      });

      document.getElementById('bannerSugarFree')?.addEventListener('click', () => {
        toast('SugarFree: próximamente más contenido.', 'info');
      });

      document.getElementById('bannerColmenaHub')?.addEventListener('click', () => {
        window.open('https://colmena-hub.com', '_blank');
      });
    })();
  </script>
