<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Barb´s party match</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080810;
      --surface: #10101e;
      --card: #15152a;
      --border: rgba(255,255,255,0.07);
      --neon-pink: #ff2d78;
      --neon-green: #00f5a0;
      --neon-blue: #3d9fff;
      --neon-yellow: #ffe94e;
      --text: #f0f0ff;
      --muted: #6b6b8a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0; }
    .orb-1 { width: 300px; height: 300px; background: var(--neon-pink); top: -80px; right: -80px; }
    .orb-2 { width: 250px; height: 250px; background: var(--neon-blue); bottom: 20%; left: -100px; }
    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }
    .header { padding: 32px 24px 16px; display: flex; align-items: center; gap: 12px; }
    .header-logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 2px; background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .header-pill { background: rgba(255,45,120,0.15); border: 1px solid rgba(255,45,120,0.35); color: var(--neon-pink); font-size: 0.7rem; font-weight: 500; padding: 3px 10px; border-radius: 99px; letter-spacing: 1px; text-transform: uppercase; }
    .tabs { display: flex; padding: 0 24px; gap: 6px; margin-bottom: 24px; }
    .tab { flex: 1; padding: 10px 6px; border: none; border-radius: 10px; background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
    .tab.active { background: linear-gradient(135deg, rgba(255,45,120,0.2), rgba(61,159,255,0.2)); border: 1px solid rgba(255,45,120,0.4); color: var(--text); }
    .section { padding: 0 24px; }
    .section-title { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; }
    .profile-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 24px; position: relative; overflow: hidden; }
    .profile-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,45,120,0.06), rgba(61,159,255,0.06)); pointer-events: none; }
    .profile-number { font-family: 'Bebas Neue', cursive; font-size: 5rem; line-height: 1; background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .profile-name { font-size: 1.3rem; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .profile-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,245,160,0.1); border: 1px solid rgba(0,245,160,0.25); color: var(--neon-green); font-size: 0.7rem; padding: 4px 10px; border-radius: 99px; font-weight: 500; letter-spacing: 0.5px; }
    .profile-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--neon-green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 0.75rem; font-weight: 500; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .form-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: rgba(255,45,120,0.5); }
    .form-input::placeholder { color: var(--muted); }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 14px; font-family: 'Bebas Neue', cursive; font-size: 1.1rem; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, var(--neon-pink), #a020f0); color: #fff; box-shadow: 0 4px 24px rgba(255,45,120,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,45,120,0.45); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; transform: none; }
    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0; padding: 10px; }
    .btn-pong { background: linear-gradient(135deg, var(--neon-blue), #00f5a0); color: #000; box-shadow: 0 4px 24px rgba(61,159,255,0.3); }
    .btn-pong:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(61,159,255,0.45); }
    .player-list { display: flex; flex-direction: column; gap: 10px; }
    .player-row { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s; }
    .player-row.matched { border-color: rgba(0,245,160,0.3); background: rgba(0,245,160,0.04); }
    .player-num { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; color: var(--muted); min-width: 36px; line-height: 1; }
    .player-info { flex: 1; }
    .player-name { font-size: 0.95rem; font-weight: 500; }
    .player-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .vote-btns { display: flex; gap: 8px; }
    .vote-btn { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid transparent; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: var(--surface); }
    .vote-btn.voted-green { background: rgba(0,245,160,0.2); border-color: var(--neon-green); }
    .vote-btn.voted-red { background: rgba(255,45,120,0.2); border-color: var(--neon-pink); }
    .vote-btn:not([disabled]):hover { transform: scale(1.1); }
    .vote-btn:disabled { opacity: 0.4; cursor: default; }
    .match-badge { font-size: 0.65rem; font-weight: 600; padding: 3px 8px; border-radius: 99px; background: rgba(0,245,160,0.15); border: 1px solid rgba(0,245,160,0.3); color: var(--neon-green); letter-spacing: 0.5px; }
    .matches-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.85rem; line-height: 1.6; }
    .matches-empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }
    .pong-match { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .pong-team { flex: 1; text-align: center; }
    .pong-team-players { font-size: 0.82rem; font-weight: 500; color: var(--text); line-height: 1.6; white-space: pre-line; }
    .pong-team-label { font-family: 'Bebas Neue', cursive; font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 4px; }
    .pong-vs { font-family: 'Bebas Neue', cursive; font-size: 1.2rem; color: var(--neon-yellow); letter-spacing: 1px; }
    .pong-bye { text-align: center; padding: 12px; color: var(--muted); font-size: 0.8rem; font-style: italic; flex: 1; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--neon-green); color: #000; font-weight: 600; font-size: 0.85rem; padding: 12px 24px; border-radius: 99px; z-index: 100; animation: toastIn 0.3s ease; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,245,160,0.4); }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    .refresh-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
    .refresh-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 8px 14px; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .refresh-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
    .player-count { font-size: 0.78rem; color: var(--muted); margin-left: auto; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 8px 14px; font-size: 0.78rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .logout-btn:hover { border-color: rgba(255,45,120,0.4); color: var(--neon-pink); }
    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.8rem; color: var(--muted); }
    .ig-btn { display: inline-flex; align-items: center; gap: 5px; background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; border: none; border-radius: 8px; padding: 5px 10px; font-size: 0.72rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.2s; letter-spacing: 0.3px; }
    .ig-btn:hover { opacity: 0.85; }
    #login-screen { display: block; }
    #main-screen { display: none; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- LOGIN -->
  <div id="login-screen" class="app">
    <div class="header">
      <span class="header-logo">Barb´s party match</span>
      <span class="header-pill">L I V E</span>
    </div>
    <div class="section">
      <div class="profile-card">
        <div class="profile-number">🖇️🤍</div>
        <div class="profile-name">Tu mini perfil</div>
        <br/>
        <div class="form-group">
          <label class="form-label">Tu número de jugador (1-100)</label>
          <input class="form-input" type="number" id="input-id" placeholder="Ej: 7" min="1" max="100" />
        </div>
        <div class="form-group">
          <label class="form-label">Tu nombre</label>
          <input class="form-input" type="text" id="input-name" placeholder="Ej: María" maxlength="20" />
        </div>
        <div class="form-group">
          <label class="form-label">Instagram <span style="color:var(--muted);font-size:0.7rem;text-transform:none;letter-spacing:0">(opcional)</span></label>
          <div style="position:relative">
            <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem">@</span>
            <input class="form-input" type="text" id="input-ig" placeholder="tuusuario" maxlength="30" style="padding-left:32px" />
          </div>

  <!-- MAIN -->
  <div id="main-screen" class="app">
    <div class="header">
      <span class="header-logo">PARTY APP</span>
      <span class="header-pill">🎉 Live</span>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="players">👥 Todos</button>
      <button class="tab" data-tab="matches">💚 Matches</button>
      <button class="tab" data-tab="pong">🏓 Pong</button>
      <button class="tab" data-tab="profile">👤 Perfil</button>
    </div>

    <!-- TAB PLAYERS -->
    <div id="tab-players" class="section tab-content">
      <div class="refresh-row">
        <span class="section-title" style="margin:0">Jugadores</span>
        <span class="player-count" id="player-count">0 en la fiesta</span>
      </div>
      <div class="player-list" id="players-list">
        <div class="matches-empty"><span class="emoji">🎈</span>Cargando jugadores...</div>
      </div>
    </div>

    <!-- TAB MATCHES -->
    <div id="tab-matches" class="section tab-content" style="display:none">
      <div class="section-title">Tus Matches</div>
      <div class="player-list" id="matches-list">
        <div class="matches-empty"><span class="emoji">💫</span>Aún no tienes matches.</div>
      </div>
    </div>

    <!-- TAB PONG -->
    <div id="tab-pong" class="section tab-content" style="display:none">
      <div class="section-title">Beer Pong</div>
      <button class="btn btn-pong" id="btn-pong" style="margin-bottom:20px">🏓 Generar ronda aleatoria</button>
      <div id="pong-list">
        <div class="matches-empty"><span class="emoji">🍺</span>Genera una ronda para ver los enfrentamientos.</div>
      </div>
    </div>

    <!-- TAB PROFILE -->
    <div id="tab-profile" class="section tab-content" style="display:none">
      <div class="profile-card">
        <div class="profile-number" id="profile-num">#0</div>
        <div class="profile-name" id="profile-name-display">—</div>
        <div class="profile-badge"><span class="profile-dot"></span>En la fiesta</div>
        <div class="divider"></div>
        <div class="stats-row" id="profile-stats"></div>
        <div style="margin-top:12px" id="profile-ig"></div>
        <div class="divider"></div>
        <button class="logout-btn" id="btn-logout">Salir / Cambiar perfil</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none"></div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCY-1zJF_S7OXbGZS7_HkLMD6tzsYSTKy0",
      authDomain: "mi-fiesta-b530c.firebaseapp.com",
      projectId: "mi-fiesta-b530c",
      storageBucket: "mi-fiesta-b530c.firebasestorage.app",
      messagingSenderId: "339836539563",
      appId: "1:339836539563:web:1ae5c5c7944be9af58ddee",
      databaseURL: "https://mi-fiesta-b530c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ── STATE ──────────────────────────────────────────────────────────────
    let me = null; // { id, name }
    let players = {};
    let votes = {};
    let pongRounds = [];

    // ── UTILS ──────────────────────────────────────────────────────────────
    function showToast(msg, color = "#00f5a0") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.background = color;
      t.style.color = color === "#00f5a0" ? "#000" : "#fff";
      t.style.display = "block";
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => t.style.display = "none", 2800);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function groupIntoPairs(playerList) {
      const s = shuffle(playerList);
      const teams = [];
      for (let i = 0; i < s.length; i += 2) {
        if (i + 1 < s.length) teams.push([s[i], s[i + 1]]);
        else teams[teams.length - 1].push(s[i]);
      }
      const matches = [];
      for (let i = 0; i < teams.length - 1; i += 2) {
        matches.push({ a: teams[i], b: teams[i + 1] });
      }
      if (teams.length % 2 === 1) matches.push({ a: teams[teams.length - 1], b: null });
      return matches;
    }

    function playerName(id) {
      const p = players[id];
      return p?.name || p || `#${id}`;
    }
    function playerIg(id) {
      return players[id]?.ig || "";
    }

    function getMyVote(targetId) {
      return votes[`${me.id}_${targetId}`];
    }

    function isMatch(targetId) {
      return votes[`${me.id}_${targetId}`] === "green" && votes[`${targetId}_${me.id}`] === "green";
    }

    function getMyMatches() {
      return Object.keys(players)
        .map(Number)
        .filter(id => id !== me.id && isMatch(id))
        .map(id => ({ id, name: playerName(id), ig: playerIg(id) }));
    }

    // ── TABS ───────────────────────────────────────────────────────────────
    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
        btn.classList.add("active");
        document.getElementById(`tab-${btn.dataset.tab}`).style.display = "block";
        if (btn.dataset.tab === "profile") renderProfile();
        if (btn.dataset.tab === "matches") renderMatches();
      });
    });

    function renderPlayers() {
      const list = document.getElementById("players-list");
      const countEl = document.getElementById("player-count");
      const others = Object.keys(players).map(Number).filter(id => id !== me?.id).sort((a,b) => a-b);
      countEl.textContent = `${Object.keys(players).length} en la fiesta`;

      if (others.length === 0) {
        list.innerHTML = `<div class="matches-empty"><span class="emoji">🎈</span>Nadie más se ha unido aún.<br/>¡Comparte el link!</div>`;
        return;
      }

      list.innerHTML = others.map(id => {
        const name = playerName(id);
        const ig = playerIg(id);
        const myVote = getMyVote(id);
        const matched = isMatch(id);
        const greenClass = myVote === "green" ? "voted-green" : "";
        const redClass = myVote === "red" ? "voted-red" : "";
        const disabled = myVote ? "disabled" : "";
        const igBtn = ig ? `<a class="ig-btn" href="https://instagram.com/${ig}" target="_blank">📸 @${ig}</a>` : "";
        let sub = "";
        if (matched) sub = `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px"><span class="match-badge">✨ Match</span>${igBtn}</div>`;
        else if (myVote === "green") sub = `<div style="margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div class="player-sub">Le diste verde · esperando...</div>${igBtn}</div>`;
        else if (myVote === "red") sub = `<div style="margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div class="player-sub">Pasaste</div>${igBtn}</div>`;
        else if (igBtn) sub = `<div style="margin-top:4px">${igBtn}</div>`;

        return `
          <div class="player-row ${matched ? "matched" : ""}">
            <div class="player-num">#${id}</div>
            <div class="player-info">
              <div class="player-name">${name}</div>
              ${sub}
            </div>
            <div class="vote-btns">
              <button class="vote-btn ${redClass}" ${disabled} onclick="castVote(${id},'red')" title="No gracias">❌</button>
              <button class="vote-btn ${greenClass}" ${disabled} onclick="castVote(${id},'green')" title="¡Me interesa!">💚</button>
            </div>
          </div>`;
      }).join("");
    }

    function renderMatches() {
      const list = document.getElementById("matches-list");
      const myMatches = getMyMatches();
      if (myMatches.length === 0) {
        list.innerHTML = `<div class="matches-empty"><span class="emoji">💫</span>Aún no tienes matches mutuos.<br/>Dale verde a alguien y espera a que<br/>también te dé verde a ti.</div>`;
        return;
      }
      list.innerHTML = myMatches.map(p => `
        <div class="player-row matched">
          <div class="player-num">#${p.id}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <div class="player-sub" style="color:var(--neon-green)">¡Se gustan mutuamente! 🎉</div>
              ${p.ig ? `<a class="ig-btn" href="https://instagram.com/${p.ig}" target="_blank">📸 @${p.ig}</a>` : ""}
            </div>
          </div>
          <span style="font-size:1.5rem">💚</span>
        </div>`).join("");
    }

    function renderProfile() {
      if (!me) return;
      document.getElementById("profile-num").textContent = `#${me.id}`;
      document.getElementById("profile-name-display").textContent = me.name;
      const greens = Object.keys(votes).filter(k => k.startsWith(`${me.id}_`) && votes[k] === "green").length;
      const igHtml = me.ig ? `<a class="ig-btn" href="https://instagram.com/${me.ig}" target="_blank" style="margin-top:8px;display:inline-flex">📸 @${me.ig}</a>` : `<span style="color:var(--muted);font-size:0.75rem">Sin Instagram registrado</span>`;
      document.getElementById("profile-stats").innerHTML = `
        <span>💚 ${greens} intereses</span>
        <span>🤝 ${getMyMatches().length} matches</span>
        <span>👥 ${Object.keys(players).length} jugadores</span>`;
      document.getElementById("profile-ig").innerHTML = igHtml;
    }

    // ── RENDER PONG ────────────────────────────────────────────────────────
    function renderPong() {
      const list = document.getElementById("pong-list");
      if (!pongRounds || pongRounds.length === 0) {
        list.innerHTML = `<div class="matches-empty"><span class="emoji">🍺</span>Genera una ronda para ver los enfrentamientos.</div>`;
        return;
      }
      list.innerHTML = pongRounds.map((match, i) => {
        const aPlayers = match.a.map(p => `#${p.id} ${p.name}`).join("\n");
        if (!match.b) return `
          <div class="pong-match">
            <div class="pong-team">
              <div class="pong-team-label">Equipo A</div>
              <div class="pong-team-players">${aPlayers}</div>
            </div>
            <div class="pong-bye">Descansa esta ronda 😴</div>
          </div>`;
        const bPlayers = match.b.map(p => `#${p.id} ${p.name}`).join("\n");
        return `
          <div class="pong-match">
            <div class="pong-team">
              <div class="pong-team-label">Equipo A</div>
              <div class="pong-team-players">${aPlayers}</div>
            </div>
            <div class="pong-vs">VS</div>
            <div class="pong-team">
              <div class="pong-team-label">Equipo B</div>
              <div class="pong-team-players">${bPlayers}</div>
            </div>
          </div>`;
      }).join("");
    }

    // ── VOTE ───────────────────────────────────────────────────────────────
    window.castVote = async function(targetId, color) {
      if (!me) return;
      const key = `${me.id}_${targetId}`;
      if (votes[key]) return;
      votes[key] = color;
      await set(ref(db, `votes/${key}`), color);

      if (color === "green" && votes[`${targetId}_${me.id}`] === "green") {
        const targetName = playerName(targetId);
        showToast(`💚 ¡Match con ${targetName}!`);
      }
      renderPlayers();
    };

    // ── REGISTER ───────────────────────────────────────────────────────────
    document.getElementById("btn-register").addEventListener("click", async () => {
      const nameEl = document.getElementById("input-name");
      const idEl = document.getElementById("input-id");
      const igEl = document.getElementById("input-ig");
      const errEl = document.getElementById("login-error");
      const name = nameEl.value.trim();
      const id = parseInt(idEl.value);
      const ig = igEl.value.trim().replace(/^@/, "");
      if (!name || !id || id < 1 || id > 999) return;

      const btn = document.getElementById("btn-register");
      btn.disabled = true;
      btn.textContent = "Entrando...";

      // Check if ID is taken by someone else
      const snap = await get(ref(db, `players/${id}`));
      if (snap.exists() && snap.val()?.name !== name) {
        errEl.textContent = `❌ El número ${id} ya está en uso por ${snap.val()?.name || snap.val()}`;
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Entrar a la fiesta →";
        return;
      }

      await set(ref(db, `players/${id}`), { name, ig });
      me = { id, name, ig };
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("main-screen").style.display = "block";
      showToast(`🎉 ¡Bienvenido/a, ${name}!`);
    });

    // ── LOGOUT ─────────────────────────────────────────────────────────────
    document.getElementById("btn-logout").addEventListener("click", () => {
      me = null;
      document.getElementById("main-screen").style.display = "none";
      document.getElementById("login-screen").style.display = "block";
      document.getElementById("input-name").value = "";
      document.getElementById("input-id").value = "";
      document.getElementById("input-ig").value = "";
      document.getElementById("login-error").style.display = "none";
    });

    // ── BEER PONG ──────────────────────────────────────────────────────────
    document.getElementById("btn-pong").addEventListener("click", async () => {
      const playerList = Object.keys(players).map(id => ({ id: parseInt(id), name: playerName(parseInt(id)) }));
      if (playerList.length < 2) { showToast("Se necesitan al menos 2 jugadores", "#ff2d78"); return; }
      const rounds = groupIntoPairs(playerList);
      pongRounds = rounds;
      await set(ref(db, "pong"), rounds);
      renderPong();
      showToast("🏓 ¡Ronda generada!");
    });

    // ── FIREBASE LISTENERS ─────────────────────────────────────────────────
    onValue(ref(db, "players"), snap => {
      players = snap.val() || {};
      renderPlayers();
      renderProfile();
    });

    onValue(ref(db, "votes"), snap => {
      votes = snap.val() || {};
      renderPlayers();
      renderMatches();
      renderProfile();
    });

    onValue(ref(db, "pong"), snap => {
      pongRounds = snap.val() || [];
      renderPong();
    });

    // Enter key on login
    document.getElementById("input-name").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-register").click();
    });
  </script>
</body>
</html>
