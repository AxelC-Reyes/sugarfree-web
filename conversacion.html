<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat · Sugar Free</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAmG0T27phC-DtXbtg7bP5JgmmyEeNJ-8A",
            authDomain: "sugarfree-cbb21.firebaseapp.com",
            projectId: "sugarfree-cbb21",
            storageBucket: "sugarfree-cbb21.firebasestorage.app",
            messagingSenderId: "797632408987",
            appId: "1:797632408987:web:c96cbbdcf34885d631c53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        const otroNombre = decodeURIComponent(urlParams.get('nombre') || 'Usuario');

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                cargarMensajes();
            } else {
                window.location.href = 'index.html';
            }
        });

        async function cargarMensajes() {
            const container = document.getElementById('messages');
            const q = query(collection(db, 'chats', matchId, 'mensajes'), orderBy('createdAt', 'asc'));
            onSnapshot(q, (snapshot) => {
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = `message ${data.emisorId === currentUser.uid ? 'own' : 'other'}`;
                    div.innerHTML = `<div class="bubble">${escapeHtml(data.texto)}</div><div class="time">${new Date(data.createdAt?.toDate()).toLocaleTimeString()}</div>`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.enviarMensaje = async function() {
            const input = document.getElementById('messageInput');
            const texto = input.value.trim();
            if (!texto) return;
            await addDoc(collection(db, 'chats', matchId, 'mensajes'), {
                emisorId: currentUser.uid,
                texto: texto,
                createdAt: new Date()
            });
            await updateDoc(doc(db, 'matches', matchId), { lastMessageAt: new Date() });
            input.value = '';
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f0f14;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 16px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { display: flex; flex-direction: column; max-width: 70%; }
        .message.own { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .bubble {
            padding: 10px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .message.own .bubble {
            background: #FF3B7F;
            border-color: #FF3B7F;
        }
        .time { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; padding: 0 8px; }
        .input-area {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
        }
        button {
            background: #FF3B7F;
            border: none;
            border-radius: 50px;
            padding: 0 20px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>Chat con ${otroNombre}</h3>
        <a href="chats.html" style="color: #FF3B7F;">← Volver</a>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Escribe un mensaje...">
        <button onclick="enviarMensaje()">Enviar</button>
    </div>
</body>
</html>
