<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#030305">
    <title>Chats · Sugar Free</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, orderBy, onSnapshot, addDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAmG0T27phC-DtXbtg7bP5JgmmyEeNJ-8A",
            authDomain: "sugarfree-cbb21.firebaseapp.com",
            projectId: "sugarfree-cbb21",
            storageBucket: "sugarfree-cbb21.firebasestorage.app",
            messagingSenderId: "797632408987",
            appId: "1:797632408987:web:c96cbbdcf34885d631c53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        window.__db = db;
        window.__auth = auth;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                window.dispatchEvent(new CustomEvent('userLoaded', { detail: { user } }));
            } else {
                window.location.href = 'index-premium.html';
            }
        });
    </script>

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg:        #030305;
            --rose:      #FF3B7F;
            --orange:    #FF6B35;
            --white:     #FFFFFF;
            --w80:       rgba(255,255,255,0.8);
            --w50:       rgba(255,255,255,0.5);
            --w20:       rgba(255,255,255,0.2);
            --w10:       rgba(255,255,255,0.1);
            --ease:      cubic-bezier(0.16,1,0.3,1);
            --nav-h:     70px;
            --safe-top:    env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
        }

        /* Fondo de estrellas */
        .stars-bg {
            position: fixed; inset: 0;
            z-index: 0;
            background-image: radial-gradient(circle, rgba(255,59,127,0.12) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + var(--safe-top));
            padding-top: var(--safe-top);
            background: rgba(3,3,5,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--w10);
            z-index: 200;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 38px; height: 38px;
            background: rgba(255,59,127,0.15);
            border: 1px solid var(--rose);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--rose);
        }
        .nav-logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--rose));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s;
        }
        .nav-btn-ghost {
            background: transparent;
            border: 1px solid var(--w10);
            color: var(--w80);
        }

        /* Layout */
        .page {
            position: relative;
            z-index: 10;
            padding-top: calc(var(--nav-h) + var(--safe-top) + 30px);
            padding-bottom: 60px;
            max-width: 800px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
        }

        .page h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--w50);
            margin-bottom: 32px;
            font-size: 14px;
        }

        /* Lista de chats */
        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            border-color: var(--w10);
            background: rgba(255,255,255,0.02);
        }

        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,59,127,0.1);
            border: 1px solid var(--rose);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--rose);
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-last-message {
            font-size: 13px;
            color: var(--w50);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: var(--w20);
            flex-shrink: 0;
        }

        /* Estado vacío */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .empty-state i {
            font-size: 64px;
            color: var(--w20);
            margin-bottom: 20px;
        }
        .empty-state h3 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .empty-state p { color: var(--w50); }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }
        .loading-spinner i {
            font-size: 40px;
            color: var(--rose);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .page h1 { font-size: 24px; }
            .chat-item { padding: 12px; }
            .chat-avatar { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index-premium.html" class="nav-logo">
                <div class="nav-logo-icon"><i class="fas fa-crown"></i></div>
                <span class="nav-logo-text">Sugar Free</span>
            </a>
            <div class="nav-actions">
                <a href="listing-premium.html" class="nav-btn nav-btn-ghost">
                    <i class="fas fa-compass"></i> Explorar
                </a>
                <a href="solicitudes-recibidas.html" class="nav-btn nav-btn-ghost">
                    <i class="fas fa-bell"></i> Solicitudes
                </a>
                <a href="mi-perfil.html" class="nav-btn nav-btn-ghost">
                    <i class="fas fa-user"></i> Perfil
                </a>
                <button class="nav-btn nav-btn-ghost" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="page">
        <h1>Mensajes</h1>
        <p class="subtitle">Tus conversaciones con matches</p>

        <div id="loadingSpinner" class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Cargando conversaciones...</p>
        </div>

        <div id="chatsList" class="chats-list"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-comment-dots"></i>
            <h3>Sin conversaciones</h3>
            <p>Cuando aceptes una solicitud, aparecerá aquí el chat.</p>
            <a href="listing-premium.html" style="color: var(--rose); margin-top: 16px; display: inline-block;">Explorar perfiles →</a>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let matches = [];
        let unsubscribeFns = [];

        const loadingSpinner = document.getElementById('loadingSpinner');
        const chatsList = document.getElementById('chatsList');
        const emptyState = document.getElementById('emptyState');
        const logoutBtn = document.getElementById('logoutBtn');

        // Cargar matches del usuario
        async function loadMatches() {
            try {
                const matchesRef = collection(window.__db, 'matches');
                const q = query(matchesRef, where('userId1', '==', currentUserId));
                const querySnapshot = await getDocs(q);
                
                const matchIds = [];
                querySnapshot.forEach(doc => {
                    matchIds.push({ id: doc.id, ...doc.data() });
                });
                
                // También buscar donde userId2 es el usuario actual
                const q2 = query(matchesRef, where('userId2', '==', currentUserId));
                const querySnapshot2 = await getDocs(q2);
                querySnapshot2.forEach(doc => {
                    matchIds.push({ id: doc.id, ...doc.data() });
                });
                
                return matchIds;
            } catch (error) {
                console.error('Error al cargar matches:', error);
                return [];
            }
        }

        // Obtener información del otro usuario
        async function getOtherUserInfo(match, currentUid) {
            const otherId = match.userId1 === currentUid ? match.userId2 : match.userId1;
            const userDoc = await getDoc(doc(window.__db, 'usuarios', otherId));
            const perfilDoc = await getDoc(doc(window.__db, 'perfiles', otherId));
            
            return {
                userId: otherId,
                nombre: userDoc.exists() ? userDoc.data().nombre : 'Usuario',
                foto: perfilDoc.exists() && perfilDoc.data().fotos ? perfilDoc.data().fotos[0] : null,
                matchId: match.id
            };
        }

        // Obtener último mensaje de un chat
        function listenToLastMessage(matchId, callback) {
            const messagesRef = collection(window.__db, 'chats', matchId, 'mensajes');
            const q = query(messagesRef, orderBy('createdAt', 'desc'), limit(1));
            
            const unsubscribe = onSnapshot(q, (snapshot) => {
                if (!snapshot.empty) {
                    const lastMsg = snapshot.docs[0].data();
                    callback(lastMsg.texto, lastMsg.createdAt);
                } else {
                    callback(null, null);
                }
            });
            
            return unsubscribe;
        }

        // Renderizar lista de chats
        async function renderChats() {
            const matchesList = await loadMatches();
            
            if (matchesList.length === 0) {
                loadingSpinner.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            const chatsData = [];
            
            for (const match of matchesList) {
                const otherUser = await getOtherUserInfo(match, currentUserId);
                chatsData.push({
                    ...otherUser,
                    lastMessage: null,
                    lastTime: null
                });
            }
            
            loadingSpinner.style.display = 'none';
            emptyState.style.display = 'none';
            
            // Render inicial
            updateChatsList(chatsData);
            
            // Suscribirse a últimos mensajes
            chatsData.forEach((chat, index) => {
                const unsubscribe = listenToLastMessage(chat.matchId, (text, time) => {
                    chatsData[index].lastMessage = text;
                    chatsData[index].lastTime = time;
                    updateChatsList([...chatsData]);
                });
                unsubscribeFns.push(unsubscribe);
            });
        }
        
        function updateChatsList(chats) {
            if (chats.length === 0) {
                chatsList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            chatsList.innerHTML = chats.map(chat => `
                <div class="chat-item" onclick="openChat('${chat.matchId}', '${escapeHtml(chat.nombre)}', '${chat.userId}')">
                    <div class="chat-avatar">
                        ${chat.foto ? `<img src="${chat.foto}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">` : `<i class="fas fa-user"></i>`}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(chat.nombre)}</div>
                        <div class="chat-last-message">${chat.lastMessage ? escapeHtml(chat.lastMessage.substring(0, 50)) : 'Nuevo match — di hola'}</div>
                    </div>
                    <div class="chat-time">${chat.lastTime ? formatTime(chat.lastTime) : ''}</div>
                </div>
            `).join('');
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return date.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
            if (days === 1) return 'Ayer';
            if (days < 7) return `Hace ${days} días`;
            return date.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit' });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        window.openChat = function(matchId, userName, userId) {
            window.location.href = `chat-room.html?matchId=${matchId}&userName=${encodeURIComponent(userName)}&userId=${userId}`;
        };
        
        async function logout() {
            unsubscribeFns.forEach(fn => fn());
            await window.__auth.signOut();
            window.location.href = 'index-premium.html';
        }
        
        window.addEventListener('userLoaded', (event) => {
            currentUserId = event.detail.user.uid;
            renderChats();
        });
        
        logoutBtn?.addEventListener('click', logout);
    </script>
</body>
</html>
