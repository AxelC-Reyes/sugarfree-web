<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#030305">
    <title>Solicitudes · Sugar Free</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, addDoc, getDoc, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAmG0T27phC-DtXbtg7bP5JgmmyEeNJ-8A",
            authDomain: "sugarfree-cbb21.firebaseapp.com",
            projectId: "sugarfree-cbb21",
            storageBucket: "sugarfree-cbb21.firebasestorage.app",
            messagingSenderId: "797632408987",
            appId: "1:797632408987:web:c96cbbdcf34885d631c53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentUserRole = null;

        window.__db = db;
        window.__auth = auth;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, 'usuarios', user.uid));
                if (userDoc.exists()) {
                    currentUserRole = userDoc.data().role;
                    window.dispatchEvent(new CustomEvent('userLoaded', { 
                        detail: { user: user, role: currentUserRole }
                    }));
                } else {
                    window.location.href = 'index-premium.html';
                }
            } else {
                window.location.href = 'index-premium.html';
            }
        });

        window.getCurrentUser = () => currentUser;
    </script>

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg:        #030305;
            --rose:      #FF3B7F;
            --rose-dim:  rgba(255,59,127,0.15);
            --rose-line: rgba(255,59,127,0.12);
            --gold:      #C9A96E;
            --white:     #FFFFFF;
            --w80:       rgba(255,255,255,0.8);
            --w50:       rgba(255,255,255,0.5);
            --w20:       rgba(255,255,255,0.2);
            --w10:       rgba(255,255,255,0.1);
            --w04:       rgba(255,255,255,0.04);
            --ease:      cubic-bezier(0.16,1,0.3,1);
            --nav-h:     70px;
            --safe-top:    env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html { overflow-x: hidden; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
        }

        /* Fondo */
        .geo-bg {
            position: fixed; inset: 0;
            z-index: 0;
            background-image: radial-gradient(circle, rgba(255,59,127,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + var(--safe-top));
            padding-top: var(--safe-top);
            background: rgba(3,3,5,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--rose-line);
            z-index: 200;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 38px; height: 38px;
            background: var(--rose-dim);
            border: 1px solid var(--rose);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--rose);
        }
        .nav-logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--rose));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s;
        }
        .nav-btn-ghost {
            background: transparent;
            border: 1px solid var(--w10);
            color: var(--w80);
        }
        .nav-btn-primary {
            background: var(--rose);
            border: none;
            color: #fff;
        }

        /* Layout */
        .page {
            position: relative;
            z-index: 10;
            padding-top: calc(var(--nav-h) + var(--safe-top) + 40px);
            padding-bottom: 60px;
            max-width: 800px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
        }

        .page h1 {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--w50);
            margin-bottom: 32px;
            font-size: 14px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--w10);
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            color: var(--w50);
            transition: all 0.25s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--rose);
            border-bottom-color: var(--rose);
        }

        /* Cards de solicitud */
        .requests-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .request-card {
            background: var(--w04);
            border: 1px solid var(--w10);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.25s;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .request-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .request-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--rose-dim);
            border: 1px solid var(--rose);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--rose);
        }

        .request-name {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        .request-date {
            font-size: 12px;
            color: var(--w50);
        }

        .request-status {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(201,169,110,0.15);
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .status-accepted {
            background: rgba(46,204,113,0.15);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        .status-rejected {
            background: rgba(255,60,60,0.15);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .request-message {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 14px;
            margin: 12px 0;
            font-size: 14px;
            line-height: 1.5;
            color: var(--w80);
            border-left: 3px solid var(--rose);
        }

        .request-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .btn-accept {
            background: #2ecc71;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-reject {
            background: transparent;
            border: 1px solid #ff4444;
            padding: 10px 24px;
            border-radius: 50px;
            color: #ff4444;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-accept:hover { background: #27ae60; transform: scale(1.02); }
        .btn-reject:hover { background: rgba(255,60,60,0.1); transform: scale(1.02); }

        /* Estado vacío */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 64px;
            color: var(--w20);
            margin-bottom: 20px;
        }
        .empty-state h3 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .empty-state p { color: var(--w50); }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }
        .loading-spinner i {
            font-size: 40px;
            color: var(--rose);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8,8,15,0.95);
            border: 1px solid var(--rose-line);
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            font-size: 14px;
            animation: toastIn 0.3s ease;
        }
        .toast.success i { color: #2ecc71; }
        .toast.error i { color: #ff4444; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 600px) {
            .page h1 { font-size: 26px; }
            .request-header { flex-direction: column; align-items: flex-start; }
            .request-actions { width: 100%; }
            .btn-accept, .btn-reject { flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="geo-bg"></div>

    <nav class="navbar">
    <div class="navbar-inner">
        <a href="index-premium.html" class="nav-logo">
            <div class="nav-logo-icon"><i class="fas fa-crown"></i></div>
            <span class="nav-logo-text">Sugar Free</span>
        </a>
        <div class="nav-actions">
            <a href="listing-premium.html" class="nav-btn nav-btn-ghost">
                <i class="fas fa-compass"></i> Explorar
            </a>
        <a href="mi-perfil.html" class="nav-btn nav-btn-ghost">
                <i class="fas fa-user"></i> Mi Perfil
        </a>
        <a href="chat.html" class="nav-btn nav-btn-ghost">
               <i class="fas fa-comment-dots"></i> Chats
        </a>
            <button class="nav-btn nav-btn-ghost" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </div>
</nav>

    <div class="page">
        <h1>Solicitudes</h1>
        <p class="subtitle">Gestiona las solicitudes de conexión que has recibido</p>

        <div class="tabs">
            <div class="tab active" data-tab="pendientes">Pendientes</div>
            <div class="tab" data-tab="historial">Historial</div>
        </div>

        <div id="loadingSpinner" class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Cargando solicitudes...</p>
        </div>

        <div id="requestsList" class="requests-list"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-inbox"></i>
            <h3>No hay solicitudes</h3>
            <p>Cuando alguien te envíe una solicitud, aparecerá aquí.</p>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let currentTab = 'pendientes';
        let allRequests = [];

        // Elementos DOM
        const loadingSpinner = document.getElementById('loadingSpinner');
        const requestsList = document.getElementById('requestsList');
        const emptyState = document.getElementById('emptyState');
        const logoutBtn = document.getElementById('logoutBtn');

        // Formatear fecha
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return 'Hoy';
            if (days === 1) return 'Ayer';
            if (days < 7) return `Hace ${days} días`;
            return date.toLocaleDateString('es-MX');
        }

        // Cargar solicitudes desde Firestore
        async function loadRequests() {
            if (!currentUserId) return;

            try {
                const solicitudesRef = collection(window.__db, 'solicitudes');
                const q = query(
                    solicitudesRef,
                    where('receptorId', '==', currentUserId),
                    orderBy('createdAt', 'desc')
                );
                
                const querySnapshot = await getDocs(q);
                const requests = [];
                
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    requests.push({
                        id: docSnap.id,
                        emisorId: data.emisorId,
                        emisorNombre: data.emisorNombre || 'Usuario',
                        mensaje: data.mensaje,
                        estado: data.estado,
                        createdAt: data.createdAt
                    });
                });
                
                allRequests = requests;
                renderRequests();
                
            } catch (error) {
                console.error('Error al cargar solicitudes:', error);
                toast('Error al cargar solicitudes', 'error');
            } finally {
                loadingSpinner.style.display = 'none';
            }
        }

        // Renderizar solicitudes según tab activa
        function renderRequests() {
            const filtered = allRequests.filter(r => {
                if (currentTab === 'pendientes') return r.estado === 'pendiente';
                return r.estado !== 'pendiente';
            });

            if (filtered.length === 0) {
                requestsList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            requestsList.innerHTML = filtered.map(request => {
                const statusClass = request.estado === 'pendiente' ? 'status-pending' :
                                   request.estado === 'aceptada' ? 'status-accepted' : 'status-rejected';
                const statusText = request.estado === 'pendiente' ? 'Pendiente' :
                                  request.estado === 'aceptada' ? 'Aceptada' : 'Rechazada';
                
                return `
                    <div class="request-card" data-id="${request.id}">
                        <div class="request-header">
                            <div class="request-user">
                                <div class="request-avatar">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <div class="request-name">${escapeHtml(request.emisorNombre)}</div>
                                    <div class="request-date">${formatDate(request.createdAt)}</div>
                                </div>
                            </div>
                            <div class="request-status ${statusClass}">${statusText}</div>
                        </div>
                        <div class="request-message">
                            <i class="fas fa-quote-left" style="color: var(--rose); font-size: 12px; margin-right: 8px;"></i>
                            "${escapeHtml(request.mensaje)}"
                        </div>
                        ${request.estado === 'pendiente' ? `
                            <div class="request-actions">
                                <button class="btn-accept" onclick="acceptRequest('${request.id}', '${request.emisorId}', '${escapeHtml(request.emisorNombre)}')">
                                    <i class="fas fa-check"></i> Aceptar
                                </button>
                                <button class="btn-reject" onclick="rejectRequest('${request.id}')">
                                    <i class="fas fa-times"></i> Rechazar
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // Escapar HTML para prevenir XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Aceptar solicitud
        window.acceptRequest = async function(requestId, emisorId, emisorNombre) {
            try {
                const requestRef = doc(window.__db, 'solicitudes', requestId);
                await updateDoc(requestRef, {
                    estado: 'aceptada',
                    updatedAt: new Date().toISOString()
                });
                
                // Crear match
                const matchRef = collection(window.__db, 'matches');
                await addDoc(matchRef, {
                    userId1: currentUserId,
                    userId2: emisorId,
                    createdAt: new Date().toISOString(),
                    lastMessageAt: new Date().toISOString()
                });
                
                toast(`Has aceptado la solicitud de ${emisorNombre}`, 'success');
                loadRequests(); // Recargar
                
            } catch (error) {
                console.error('Error al aceptar solicitud:', error);
                toast('Error al aceptar solicitud', 'error');
            }
        };

        // Rechazar solicitud
        window.rejectRequest = async function(requestId) {
            try {
                const requestRef = doc(window.__db, 'solicitudes', requestId);
                await updateDoc(requestRef, {
                    estado: 'rechazada',
                    updatedAt: new Date().toISOString()
                });
                
                toast('Solicitud rechazada', 'success');
                loadRequests(); // Recargar
                
            } catch (error) {
                console.error('Error al rechazar solicitud:', error);
                toast('Error al rechazar solicitud', 'error');
            }
        };

        // Cerrar sesión
        async function logout() {
            await window.__auth.signOut();
            window.location.href = 'index-premium.html';
        }

        // Toast
        function toast(msg, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toastEl = document.createElement('div');
            toastEl.className = `toast ${type}`;
            toastEl.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${msg}</span>`;
            document.body.appendChild(toastEl);
            
            setTimeout(() => {
                toastEl.remove();
            }, 3000);
        }

        // Eventos
        window.addEventListener('userLoaded', (event) => {
            currentUserId = event.detail.user.uid;
            loadRequests();
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderRequests();
            });
        });

        logoutBtn?.addEventListener('click', logout);

        const adminEmails = ['axelcazaresreyes@gmail.com']; // Cambia por tu correo

        onAuthStateChanged(auth, (user) => {
        if (user && adminEmails.includes(user.email)) {
           const adminLink = document.getElementById('adminLink');
           if (adminLink) adminLink.style.display = 'flex';
        }
   });
    </script>
    
</body>
</html>
